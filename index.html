<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TV TIME REBORN</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="preconnect" href="https://api.tvmaze.com">
    <link rel="preconnect" href="https://vjhegncviufyguzdrpdp.supabase.co">
    <style>
        body { background-color: #111827; -webkit-tap-highlight-color: transparent; }
        .hide-scroll::-webkit-scrollbar { display: none; }
        .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }
        .hidden { display: none !important; }
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .tab-enter { animation: tabEnter 0.18s ease-out forwards; }
        @keyframes tabEnter { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }
        
        .media-poster { width: 100%; aspect-ratio: 155.88 / 217.56; object-fit: cover; }
        .media-grid { display: grid; gap: 0.5rem; grid-template-columns: repeat(3, 1fr); }
        @media (min-width: 480px)  { .media-grid { grid-template-columns: repeat(4, 1fr); } }
        @media (min-width: 640px)  { .media-grid { grid-template-columns: repeat(5, 1fr); } }
        @media (min-width: 900px)  { .media-grid { grid-template-columns: repeat(6, 1fr); } }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 font-sans pb-20">

<header class="bg-gray-800 border-b border-gray-700 sticky top-0 z-50 shadow-md">
    <div class="max-w-screen-2xl mx-auto px-4 py-2.5 flex justify-between items-center">
        <div class="flex items-center gap-2">
            <h1 class="text-lg font-black tracking-wider text-teal-400">TV TIME <span class="text-white text-xs px-2 py-0.5 bg-teal-600 rounded">REBORN</span></h1>
        </div>
        <div class="flex items-center gap-2">
            <button onclick="forceSync()" id="cloudStatus" class="cursor-pointer text-[10px] px-2 py-0.5 bg-gray-900 text-gray-400 rounded-full font-bold flex items-center gap-1 border border-gray-700 transition-colors">○ Local</button>
            <span id="libCount" class="text-[10px] px-2 py-0.5 bg-teal-950 text-teal-400 rounded-full font-bold border border-teal-900/50 hidden">0</span>
        </div>
    </div>
</header>

<main class="max-w-screen-2xl mx-auto px-3 sm:px-4 pt-4 w-full">

    <!-- TAB: SEARCH -->
    <div id="tab-search" class="space-y-4">
        <div class="flex flex-col gap-2">
            <div class="flex gap-2">
                <div class="grid grid-cols-2 gap-1.5 bg-gray-800 p-1 rounded-xl border border-gray-700 flex-shrink-0 w-48">
                    <button onclick="setMediaType('series')" id="btn-series" class="py-2 text-sm font-bold rounded-lg transition bg-teal-600 text-white shadow">Séries</button>
                    <button onclick="setMediaType('movie')" id="btn-movie" class="py-2 text-sm font-bold rounded-lg transition text-gray-400">Films</button>
                </div>
                <div class="relative flex-1">
                    <input type="text" id="searchInput" placeholder="Recherche souple (ex: hou drag)..." autocomplete="off"
                        class="w-full bg-gray-800 border border-gray-700 rounded-xl px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-teal-500 text-sm" />
                </div>
            </div>
            <div class="flex gap-2 items-center">
                <select id="searchBroadcastFilter" onchange="displaySearchResults()" class="bg-gray-800 border border-gray-700 rounded-lg text-xs px-2.5 py-1.5 text-gray-300 focus:outline-none">
                    <option value="all">Toutes diffusions</option>
                    <option value="running">En cours</option>
                    <option value="ended">Terminées</option>
                    <option value="canceled">Annulées</option>
                </select>
            </div>
        </div>
        <div id="searchError" class="text-red-400 text-sm bg-red-950/40 p-3 rounded-xl border border-red-900/50 hidden"></div>
        <div id="searchResults" class="media-grid"></div>
    </div>

    <!-- TAB: DISCOVER -->
    <div id="tab-discover" class="space-y-4 hidden">
        <div class="bg-gray-800 p-3 sm:p-4 rounded-xl border border-gray-700 shadow-sm flex justify-between items-center">
            <div>
                <h2 class="text-base font-bold text-white">✨ Recommandations</h2>
                <p class="text-[10px] text-gray-400">Ciblé sur vos goûts</p>
            </div>
            <button onclick="renderDiscoverTab(true)" class="text-[10px] bg-teal-900/50 border border-teal-700 text-teal-300 px-3 py-1.5 rounded-lg font-bold">↻ Rafraîchir</button>
        </div>
        <div id="discoverGrid" class="media-grid"></div>
    </div>

    <!-- TAB: CALENDAR -->
    <div id="tab-calendar" class="space-y-4 hidden">
        <h2 class="text-lg font-bold text-white border-b border-gray-800 pb-2">📅 Sorties à venir</h2>
        <div id="calendarTimeline" class="space-y-2"></div>
    </div>

    <!-- TAB: LIBRARY -->
    <div id="tab-library" class="space-y-3 hidden">
        <div class="flex flex-wrap gap-2 items-center border-b border-gray-800 pb-3">
            <select id="libraryTypeFilter" onchange="renderLibrary()" class="bg-gray-800 border border-gray-700 rounded-lg text-xs px-2 py-1 text-gray-300">
                <option value="all">Tous types</option>
                <option value="series">Séries</option>
                <option value="movie">Films</option>
            </select>
            <select id="libraryStatusFilter" onchange="renderLibrary()" class="bg-gray-800 border border-gray-700 rounded-lg text-xs px-2 py-1 text-gray-300">
                <option value="all">Tous visionnages</option>
                <option value="not_finished">En cours</option>
                <option value="watched">Terminé</option>
                <option value="abandoned">Abandonné</option>
            </select>
            <select id="libraryDiffusionFilter" onchange="renderLibrary()" class="bg-gray-800 border border-gray-700 rounded-lg text-xs px-2 py-1 text-gray-300">
                <option value="all">Toutes diffusions</option>
                <option value="running">En cours</option>
                <option value="ended">Terminée</option>
                <option value="canceled">Annulée</option>
            </select>
            <input type="text" id="librarySearch" oninput="renderLibrary()" placeholder="Filtrer..." class="bg-gray-800 border border-gray-700 rounded-lg text-xs px-2.5 py-1.5 w-full sm:w-36">
        </div>
        <div id="libraryGrid" class="media-grid"></div>
    </div>

    <!-- TAB: PROFILE -->
    <div id="tab-profile" class="space-y-4 hidden">
        <div class="grid grid-cols-2 gap-2">
            <label class="bg-teal-600 text-white text-xs font-bold py-3 rounded-xl transition text-center cursor-pointer">
                📂 Importer JSON<input type="file" onchange="importLibrary(event)" class="hidden" accept=".json" />
            </label>
            <button onclick="clearAll()" class="bg-gray-800 border border-red-900/40 text-red-400 text-xs font-bold py-3 rounded-xl">🗑 Vider</button>
        </div>
    </div>
</main>

<!-- MODAL COMPLÈTE ET CORRIGÉE -->
<div id="mediaModal" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-50 overflow-y-auto p-3 flex items-start justify-center hidden">
    <div class="bg-gray-800 border border-gray-700 w-full max-w-lg lg:max-w-2xl rounded-2xl overflow-hidden my-4 shadow-2xl">
        <div class="p-3 sm:p-4 flex gap-3 border-b border-gray-700 bg-gray-800/60 sticky top-0 backdrop-blur z-10">
            <img id="modalPoster" src="" class="w-16 h-24 object-cover rounded bg-gray-900 border border-gray-700 flex-shrink-0" />
            <div class="min-w-0 flex-1 flex flex-col justify-center">
                <div class="flex justify-between items-start">
                    <h2 id="modalTitle" class="font-black text-white text-lg truncate">Détails</h2>
                    <button onclick="closeModal()" class="text-gray-400 hover:text-white bg-gray-700 w-7 h-7 rounded-full flex items-center justify-center font-bold text-sm">✕</button>
                </div>
                <div class="flex flex-wrap gap-1 mt-1">
                    <span id="modalTypeBadge" class="text-[9px] font-black px-1.5 py-0.5 rounded bg-teal-600 text-white">SÉRIE</span>
                    <span id="modalProductionBadge" class="text-[9px] font-bold px-1.5 py-0.5 rounded uppercase"></span>
                    <span id="modalGlobalRating" class="text-xs font-bold text-yellow-400 ml-auto">★ N/A</span>
                </div>
                <!-- BOUTON OVERRIDE ANNULATION -->
                <button id="btnForceCancel" onclick="toggleForceCancel()" class="mt-2 text-[10px] w-max bg-gray-900 border border-red-900/50 text-red-400 px-2 py-1 rounded hidden hover:bg-red-900/30">Force : Marquer Annulée</button>
            </div>
        </div>
        
        <div class="p-3 sm:p-4 space-y-4">
            <div id="modalGenresRow" class="flex flex-wrap gap-1 hidden"></div>
            <p id="modalSummary" class="text-xs text-gray-300 leading-relaxed bg-gray-900/40 p-3 rounded-xl border border-gray-700/50"></p>
            
            <div id="modalSeriesContent" class="space-y-4 hidden">
                <div id="modalSeasonSelectionRow" class="space-y-2">
                    <h3 class="text-xs font-bold text-gray-400 uppercase tracking-wider">Saisons</h3>
                    <div id="modalSeasonTabs" class="flex gap-1.5 overflow-x-auto pb-1 hide-scroll"></div>
                </div>
            </div>
            
            <div id="modalEpisodesBlock" class="space-y-2 hidden">
                <h3 class="text-sm font-bold text-white">Épisodes</h3>
                <div id="modalEpisodesList" class="max-h-64 overflow-y-auto space-y-2 pr-1 hide-scroll"></div>
            </div>
            
            <div id="modalActionButtonsGrid" class="grid grid-cols-2 gap-2 pt-2">
                <button id="modalActionFollowBtn" class="w-full py-3 bg-teal-600 text-white font-bold rounded-xl text-xs shadow">À regarder</button>
                <button id="modalActionAllWatchedBtn" class="w-full py-3 bg-emerald-600 text-white font-bold rounded-xl text-xs shadow">Déjà vu</button>
            </div>
        </div>
    </div>
</div>

<nav class="fixed bottom-0 left-0 right-0 bg-gray-800 border-t border-gray-700 h-16 flex items-center justify-around z-40">
    <button onclick="switchTab('search')" id="nav-search" class="flex flex-col items-center text-xs text-teal-400 font-bold flex-1"><span class="text-lg">🔍</span><span class="text-[10px]">Chercher</span></button>
    <button onclick="switchTab('discover')" id="nav-discover" class="flex flex-col items-center text-xs text-gray-400 flex-1"><span class="text-lg">✨</span><span class="text-[10px]">Découvrir</span></button>
    <button onclick="switchTab('calendar')" id="nav-calendar" class="flex flex-col items-center text-xs text-gray-400 flex-1"><span class="text-lg">📅</span><span class="text-[10px]">Calendrier</span></button>
    <button onclick="switchTab('library')" id="nav-library" class="flex flex-col items-center text-xs text-gray-400 flex-1"><span class="text-lg">📚</span><span class="text-[10px]">Suivis</span></button>
    <button onclick="switchTab('profile')" id="nav-profile" class="flex flex-col items-center text-xs text-gray-400 flex-1"><span class="text-lg">📊</span><span class="text-[10px]">Profil</span></button>
</nav>

<script>
    'use strict';
    
    const TVMAZE_API = 'https://api.tvmaze.com';
    const OMDB_API   = `https://www.omdbapi.com/?apikey=1e01c814`;
    const SUPABASE_URL = 'https://vjhegncviufyguzdrpdp.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_hLYKWsVftWedOIbDinl0mQ_9uGREGsw';
    
    let supabaseClient = null;
    const localUserId = 'tvr_master_user_2026';
    
    let currentMediaType = 'series', searchResults = [];
    let showsCache = [];
    let library = JSON.parse(localStorage.getItem('personal_tracker_db')) || [];
    let syncQueue = JSON.parse(localStorage.getItem('personal_tracker_sync_queue')) || [];
    let activeModalMediaIndex = null, activeModalSeason = null, modalMode = 'preview', previewEpisodes = [];

    // --- INIT & SYNC ---
    window.addEventListener('DOMContentLoaded', () => {
        initSupabase();
        document.getElementById('searchInput').addEventListener('input', e => {
            const q = e.target.value.trim();
            if (q.length > 1) triggerFuzzySearch(q);
        });
        updateHeaderCount();
        preloadShowsCache();
    });

    function saveLocalDB(mediaId = null) {
        localStorage.setItem('personal_tracker_db', JSON.stringify(library));
        updateHeaderCount();
        if (mediaId) queueForSync(mediaId);
    }

    function updateHeaderCount() {
        const el = document.getElementById('libCount');
        if(library.length > 0) { el.textContent = library.length; el.classList.remove('hidden'); }
    }

    function initSupabase() {
        try {
            supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            forceSync();
            document.addEventListener('visibilitychange', () => { if (document.visibilityState === 'visible') forceSync(); });
        } catch(e) {}
    }

    function setCloudStatus(status) {
        const el = document.getElementById('cloudStatus');
        if (status === 'syncing') el.innerHTML = 'Sync...';
        else if (status === 'offline') el.innerHTML = 'Hors-ligne';
        else el.innerHTML = '✓ Synchro OK';
    }

    function queueForSync(mediaId) {
        if (!syncQueue.includes(mediaId)) syncQueue.push(mediaId);
        localStorage.setItem('personal_tracker_sync_queue', JSON.stringify(syncQueue));
        processSyncQueue();
    }

    async function processSyncQueue() {
        if (!supabaseClient || syncQueue.length === 0) return;
        setCloudStatus('syncing');
        for (let i = syncQueue.length - 1; i >= 0; i--) {
            const id = syncQueue[i];
            const item = library.find(x => x.id === id);
            try {
                if (item) await supabaseClient.from('user_library').upsert({ user_id: localUserId, media_id: id, media_data: item, last_modified: item.last_modified });
                else await supabaseClient.from('user_library').delete().match({ user_id: localUserId, media_id: id });
                syncQueue.splice(i, 1);
            } catch (e) {}
        }
        localStorage.setItem('personal_tracker_sync_queue', JSON.stringify(syncQueue));
        setCloudStatus('online');
    }

    async function forceSync() {
        if (!supabaseClient) return;
        setCloudStatus('syncing');
        try {
            const { data } = await supabaseClient.from('user_library').select('*').eq('user_id', localUserId);
            if (data) {
                let localUpdated = false;
                data.forEach(cloudRow => {
                    const localIdx = library.findIndex(x => x.id === cloudRow.media_id);
                    if (localIdx === -1) { library.push(cloudRow.media_data); localUpdated = true; }
                    else if ((cloudRow.last_modified||0) > (library[localIdx].last_modified||0)) { library[localIdx] = cloudRow.media_data; localUpdated = true; }
                });
                if (localUpdated) { saveLocalDB(); renderLibrary(); }
            }
            processSyncQueue();
        } catch(e) { setCloudStatus('offline'); }
    }

    // --- NAVIGATION ---
    function switchTab(name) {
        ['search','discover','calendar','library','profile'].forEach(t => {
            document.getElementById(`tab-${t}`).classList.add('hidden');
            document.getElementById(`nav-${t}`).classList.replace('text-teal-400', 'text-gray-400');
        });
        document.getElementById(`tab-${name}`).classList.remove('hidden');
        document.getElementById(`nav-${name}`).classList.replace('text-gray-400', 'text-teal-400');
        if (name === 'library') renderLibrary();
        if (name === 'discover') renderDiscoverTab();
    }

    function setMediaType(type) {
        currentMediaType = type;
        document.getElementById('btn-series').className = type === 'series' ? 'py-2 text-sm font-bold rounded-lg transition bg-teal-600 text-white' : 'py-2 text-sm font-bold rounded-lg transition text-gray-400';
        document.getElementById('btn-movie').className = type === 'movie' ? 'py-2 text-sm font-bold rounded-lg transition bg-teal-600 text-white' : 'py-2 text-sm font-bold rounded-lg transition text-gray-400';
        displaySearchResults();
    }

    // --- RECHERCHE "FUZZY" ---
    async function triggerFuzzySearch(query) {
        const qWords = query.toLowerCase().split(/\s+/).filter(w => w.length > 0);
        try {
            const [omdbRes, tvmazeRes] = await Promise.all([
                fetch(`${OMDB_API}&s=${encodeURIComponent(query)}`).then(r => r.json()).catch(()=>({})),
                fetch(`${TVMAZE_API}/search/shows?q=${encodeURIComponent(query)}`).then(r => r.json()).catch(()=>[])
            ]);
            let results = [];
            if (omdbRes.Search) results = results.concat(omdbRes.Search.map(m => ({ id: `movie-${m.imdbID}`, apiId: m.imdbID, title: m.Title, type: 'movie', image: m.Poster !== 'N/A' ? m.Poster : '', rating: 0, genres: [] })));
            if (Array.isArray(tvmazeRes)) results = results.concat(tvmazeRes.map(i => normalizeShow(i.show)));
            
            // Fuzzy search locale puissante
            const localMatches = showsCache.filter(s => {
                const t = s.name.toLowerCase();
                return qWords.every(w => t.includes(w)); 
            }).map(normalizeShow);
            
            results = [...results, ...localMatches].filter((v,i,a)=>a.findIndex(t=>(t.id===v.id))===i);
            searchResults = results;
            displaySearchResults();
        } catch(e) {}
    }

    function displaySearchResults() {
        const container = document.getElementById('searchResults');
        container.innerHTML = '';
        const diffFilter = document.getElementById('searchBroadcastFilter').value;
        
        let filtered = searchResults.filter(r => r.type === currentMediaType);
        if (currentMediaType === 'series' && diffFilter !== 'all') {
            filtered = filtered.filter(item => {
                const s = (item.status_production || '').toLowerCase();
                const isManualCanceled = item.user_forced_cancel === true;
                if(diffFilter === 'canceled') return isManualCanceled || s.includes('cancel');
                if(diffFilter === 'running') return s.includes('running') && !isManualCanceled;
                if(diffFilter === 'ended') return s.includes('ended') && !isManualCanceled;
                return true;
            });
        }
        filtered.slice(0, 30).forEach(m => container.appendChild(createMediaCard(m)));
    }

    // --- DECOUVERTE PERSONNALISÉE ---
    async function ensureShowsPool() {
        if (showsCache.length > 0) return;
        const res = await fetch(`${TVMAZE_API}/shows?page=0`);
        showsCache = await res.json();
    }
    async function preloadShowsCache() { await ensureShowsPool(); }

    async function renderDiscoverTab(force = false) {
        const container = document.getElementById('discoverGrid');
        if (!force && container.children.length > 0) return;
        await ensureShowsPool();
        
        // Poids fort sur l'Anime, l'Action et la Fantasy pour correspondre aux goûts
        const favoriteKeywords = ['Anime', 'Animation', 'Action', 'Fantasy'];
        const libIds = new Set(library.map(i => i.id));
        
        let pool = showsCache.filter(s => !libIds.has(`series-${s.id}`));
        
        // Priorise les séries qui matchent les mots clés forts
        let personalized = pool.filter(s => s.genres?.some(g => favoriteKeywords.includes(g)));
        
        // Si pas assez, on complète avec le reste
        if(personalized.length < 12) personalized = [...personalized, ...pool];
        
        // Mélange
        personalized = personalized.sort(() => 0.5 - Math.random()).slice(0, 18);
        
        container.innerHTML = '';
        personalized.forEach(s => container.appendChild(createMediaCard(normalizeShow(s))));
    }

    // --- BIBLIOTHEQUE ---
    function renderLibrary() {
        const grid = document.getElementById('libraryGrid');
        const sFilter = document.getElementById('libraryStatusFilter').value;
        const dFilter = document.getElementById('libraryDiffusionFilter').value;
        const tFilter = document.getElementById('libraryTypeFilter').value;
        const search = document.getElementById('librarySearch').value.toLowerCase();
        
        grid.innerHTML = '';
        
        library.filter(item => {
            if (tFilter !== 'all' && item.type !== tFilter) return false;
            if (sFilter === 'not_finished' && item.status !== 'In Progress') return false;
            if (sFilter === 'watched' && item.status !== 'Watched') return false;
            if (sFilter === 'abandoned' && item.status !== 'Abandoned') return false;
            
            // Filtre de diffusion robuste avec prise en compte du forçage manuel "Annulé"
            if (item.type === 'series' && dFilter !== 'all') {
                const sp = (item.status_production || '').toLowerCase();
                const isManualCanceled = item.user_forced_cancel === true;
                
                if (dFilter === 'canceled' && !isManualCanceled && !sp.includes('cancel')) return false;
                if (dFilter === 'running' && (isManualCanceled || !sp.includes('running'))) return false;
                if (dFilter === 'ended' && (isManualCanceled || !sp.includes('ended'))) return false;
            }
            if (search && !item.title.toLowerCase().includes(search)) return false;
            return true;
        }).forEach((item, idx) => {
            grid.appendChild(createMediaCard(item, true));
        });
    }

    function createMediaCard(media, isLib = false) {
        const isAnime = media.genres?.includes('Anime') || media.genres?.includes('Animation');
        const typeFlag = media.type === 'movie' ? 'FILM' : (isAnime ? 'ANIME' : 'SÉRIE');
        const typeClass = media.type === 'movie' ? 'bg-amber-600' : (isAnime ? 'bg-purple-600' : 'bg-teal-600');
        
        const div = document.createElement('div');
        div.className = 'bg-gray-800 rounded-xl border border-gray-700 overflow-hidden cursor-pointer shadow-sm relative';
        div.onclick = () => isLib ? openLibraryModal(media.id) : openPreviewModal(media);
        
        div.innerHTML = `
            <div class="relative w-full">
                <img src="${media.image || 'https://placehold.co/155x217/1f2937/4b5563'}" class="media-poster bg-gray-900" />
                <span class="absolute top-1 left-1 text-[8px] font-black px-1.5 py-0.5 rounded ${typeClass} text-white">${typeFlag}</span>
            </div>
            <div class="p-1.5"><h3 class="font-bold text-white text-[11px] truncate">${media.title}</h3></div>
        `;
        return div;
    }

    // --- MODALES (LA CORRECTION DU CLIC) ---
    function normalizeShow(show) {
        return {
            id: `series-${show.id}`, apiId: show.id, title: show.name, type: 'series',
            image: show.image?.medium || '', summary: show.summary?.replace(/<[^>]*>/g, '') || '',
            rating: show.rating?.average || 0, genres: show.genres || [], status_production: show.status || 'Running'
        };
    }

    async function openPreviewModal(media) {
        modalMode = 'preview';
        document.getElementById('modalTitle').textContent = media.title;
        document.getElementById('modalPoster').src = media.image || 'https://placehold.co/155x217';
        document.getElementById('modalSummary').textContent = media.summary || 'Aucun résumé.';
        document.getElementById('btnForceCancel').classList.add('hidden');
        
        renderProductionBadge(media.status_production, media.user_forced_cancel);
        
        document.getElementById('modalActionButtonsGrid').classList.remove('hidden');
        document.getElementById('modalSeriesContent').classList.add('hidden');
        
        const followBtn = document.getElementById('modalActionFollowBtn');
        const watchedBtn = document.getElementById('modalActionAllWatchedBtn');
        
        if (library.some(i => i.id === media.id)) {
            followBtn.textContent = '✕ Retirer';
            followBtn.onclick = () => { removeFromLibrary(media.id); closeModal(); };
            watchedBtn.classList.add('hidden');
        } else {
            watchedBtn.classList.remove('hidden');
            followBtn.textContent = '+ À regarder';
            followBtn.onclick = async () => { await addToLibrary(media, false); closeModal(); switchTab('library'); };
            watchedBtn.onclick = async () => { await addToLibrary(media, true); closeModal(); switchTab('library'); };
        }
        
        if (media.type === 'series') {
            document.getElementById('modalSeriesContent').classList.remove('hidden');
            const res = await fetch(`${TVMAZE_API}/shows/${media.apiId}/episodes`);
            previewEpisodes = await res.json();
            buildSeasonTabs(previewEpisodes, false);
        }
        document.getElementById('mediaModal').classList.remove('hidden');
    }

    function openLibraryModal(id) {
        modalMode = 'library';
        const idx = library.findIndex(i => i.id === id);
        activeModalMediaIndex = idx;
        const item = library[idx];
        
        document.getElementById('modalTitle').textContent = item.title;
        document.getElementById('modalPoster').src = item.image;
        document.getElementById('modalSummary').textContent = item.summary;
        
        renderProductionBadge(item.status_production, item.user_forced_cancel);
        
        // Bouton pour forcer le statut annulé
        const btnCancel = document.getElementById('btnForceCancel');
        if (item.type === 'series') {
            btnCancel.classList.remove('hidden');
            btnCancel.textContent = item.user_forced_cancel ? "Restaurer API Status" : "Force : Marquer Annulée";
        } else {
            btnCancel.classList.add('hidden');
        }

        document.getElementById('modalActionButtonsGrid').classList.add('hidden');
        
        if (item.type === 'series' && item.episodes) {
            document.getElementById('modalSeriesContent').classList.remove('hidden');
            buildSeasonTabs(item.episodes, true);
        }
        document.getElementById('mediaModal').classList.remove('hidden');
    }

    function closeModal() {
        document.getElementById('mediaModal').classList.add('hidden');
        activeModalMediaIndex = null;
        renderLibrary();
    }

    // --- GESTION DU STATUT ANNULÉ MANUEL ---
    function renderProductionBadge(status, forcedCanceled) {
        const badge = document.getElementById('modalProductionBadge');
        if(forcedCanceled) {
            badge.textContent = 'Annulée (Forcé)';
            badge.className = 'text-[9px] font-bold px-1.5 py-0.5 rounded uppercase bg-red-900 text-red-300';
            return;
        }
        const s = (status || '').toLowerCase();
        if (s.includes('running')) { badge.textContent = 'En cours'; badge.className = 'text-[9px] font-bold px-1.5 py-0.5 rounded bg-emerald-900 text-emerald-400'; }
        else if (s.includes('ended')) { badge.textContent = 'Terminée'; badge.className = 'text-[9px] font-bold px-1.5 py-0.5 rounded bg-gray-700 text-gray-300'; }
        else if (s.includes('cancel')) { badge.textContent = 'Annulée'; badge.className = 'text-[9px] font-bold px-1.5 py-0.5 rounded bg-red-900 text-red-400'; }
        else { badge.textContent = status || ''; badge.className = 'text-[9px] font-bold px-1.5 py-0.5 rounded bg-gray-700 text-gray-300'; }
    }

    function toggleForceCancel() {
        if(activeModalMediaIndex === null) return;
        const item = library[activeModalMediaIndex];
        item.user_forced_cancel = !item.user_forced_cancel;
        item.last_modified = Date.now();
        saveLocalDB(item.id);
        openLibraryModal(item.id); // Refresh modale
    }

    // --- UTILITAIRES EPISODES ---
    function buildSeasonTabs(episodes, isLib) {
        const seasons = [...new Set(episodes.map(e => e.season))];
        const tabs = document.getElementById('modalSeasonTabs');
        tabs.innerHTML = '';
        document.getElementById('modalEpisodesBlock').classList.remove('hidden');
        
        seasons.forEach((s, i) => {
            const btn = document.createElement('button');
            btn.className = `px-3 py-1 text-xs font-bold rounded-lg shrink-0 ${i===0?'bg-teal-600 text-white':'bg-gray-700 text-gray-300'}`;
            btn.textContent = `S${s}`;
            btn.onclick = (e) => {
                Array.from(tabs.children).forEach(b=>b.classList.replace('bg-teal-600','bg-gray-700'));
                e.target.classList.replace('bg-gray-700','bg-teal-600');
                renderEpisodes(episodes.filter(ep => ep.season === s), isLib);
            };
            tabs.appendChild(btn);
        });
        if (seasons.length > 0) renderEpisodes(episodes.filter(ep => ep.season === seasons[0]), isLib);
    }

    function renderEpisodes(eps, isLib) {
        const list = document.getElementById('modalEpisodesList');
        list.innerHTML = eps.map(ep => `
            <div class="p-2 rounded-xl bg-gray-900/60 border border-gray-700/50 text-xs flex justify-between items-center">
                <span class="truncate text-gray-300">E${ep.number} – <b class="text-white">${ep.name || 'Épisode '+ep.number}</b></span>
                ${isLib ? `<button onclick="toggleEp(${ep.id})" class="px-2 py-1 rounded text-[10px] ${ep.watched ? 'bg-emerald-900 text-emerald-400' : 'bg-gray-800'}">${ep.watched ? '✓ Vu' : 'Vu'}</button>` : ''}
            </div>
        `).join('');
    }

    function toggleEp(epId) {
        const item = library[activeModalMediaIndex];
        const ep = item.episodes.find(e => e.id === epId);
        ep.watched = !ep.watched;
        item.last_modified = Date.now();
        saveLocalDB(item.id);
        renderEpisodes(item.episodes.filter(e => e.season === ep.season), true);
    }

    async function addToLibrary(media, watched) {
        let episodes = [];
        if (media.type === 'series') {
            const res = await fetch(`${TVMAZE_API}/shows/${media.apiId}/episodes`);
            const data = await res.json();
            episodes = data.map(ep => ({...ep, watched}));
        }
        const entry = { ...media, episodes, status: watched ? 'Watched' : 'In Progress', addedAt: Date.now(), last_modified: Date.now() };
        library.push(entry);
        saveLocalDB(entry.id);
    }

    function removeFromLibrary(id) {
        library = library.filter(i => i.id !== id);
        saveLocalDB();
        queueForSync(id);
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TV TIME REBORN - PROJET COMPLET</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body { background-color: #111827; }
        .guide-line { position: absolute; left: 0; right: 0; border-top: 1px dashed rgba(234, 179, 8, 0.4); }
        .hide-scroll::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 font-sans pb-24">
    <header class="bg-gray-800 border-b border-gray-700 sticky top-0 z-50 px-4 py-3 shadow-lg">
        <h1 class="text-indigo-400 font-black tracking-wider">TV TIME REBORN</h1>
    </header>

    <main id="app-container" class="max-w-md mx-auto p-4 w-full sm:max-w-2xl min-h-screen"></main>

    <nav class="fixed bottom-0 left-0 right-0 bg-gray-900 border-t border-gray-800 h-16 flex items-center justify-around z-40 shadow-2xl">
        <button onclick="switchTab('search')" class="text-xs font-bold text-indigo-400">🔍</button>
        <button onclick="switchTab('discover')" class="text-xs font-bold text-gray-400">✨</button>
        <button onclick="switchTab('calendar')" class="text-xs font-bold text-gray-400">📅</button>
        <button onclick="switchTab('library')" class="text-xs font-bold text-gray-400">📚</button>
        <button onclick="switchTab('profile')" class="text-xs font-bold text-gray-400">📊</button>
    </nav>

    <div id="mediaModal" class="fixed inset-0 bg-black/90 z-50 p-4 hidden">
        <div class="bg-gray-800 w-full max-w-lg rounded-2xl p-6 mx-auto mt-10 border border-gray-700">
            <h2 id="modalTitle" class="text-xl font-bold mb-4"></h2>
            <div class="h-24 my-6 relative bg-gray-900 rounded border border-gray-700 p-2">
                <div class="guide-line" style="top: 2px;"></div> <!-- 10 -->
                <div class="guide-line" style="top: 24px;"></div> <!-- 7.5 -->
                <div class="guide-line" style="top: 48px;"></div> <!-- 5 -->
                <div id="modalGlobalGraph" class="flex h-full items-end gap-1"></div>
            </div>
            <div id="modalSuggestionsBlock" class="hidden bg-gray-900/50 p-3 rounded-xl mb-4">
                <div id="modalSuggestionsList"></div>
            </div>
            <button onclick="document.getElementById('mediaModal').classList.add('hidden')" class="w-full py-2 bg-gray-700 rounded-lg font-bold">Fermer</button>
        </div>
    </div>

    <script>
        // CONFIG & STATE
        const OMDB_KEY = "1e01c814";
        let library = JSON.parse(localStorage.getItem('db')) || [];

        // NAV & RENDER
        function switchTab(tabName) {
            const views = {
                search: `<div class="space-y-4">
                            <div class="flex gap-2">
                                <button onclick="setMediaType('series')" class="bg-indigo-600 p-2 rounded">Séries</button>
                                <button onclick="setMediaType('movie')" class="bg-gray-700 p-2 rounded">Films</button>
                            </div>
                            <input type="text" oninput="triggerHybridSearch(this.value)" placeholder="Rechercher..." class="w-full bg-gray-800 p-3 rounded-xl border border-gray-700 text-white" />
                            <div id="searchResults" class="grid grid-cols-2 gap-4"></div>
                         </div>`,
                library: '<h2 class="text-xl font-black">Suivis</h2><div id="libGrid"></div>',
                calendar: '<h2 class="text-xl font-black">À Venir</h2>',
                discover: '<h2 class="text-xl font-black">Découvrir</h2>',
                profile: '<h2 class="text-xl font-black">Profil</h2>'
            };
            document.getElementById('app-container').innerHTML = views[tabName] || '';
            if(tabName === 'library') renderLibrary();
        }

        async function triggerHybridSearch(query) {
            if(query.length < 3) return;
            const res = await fetch(`https://www.omdbapi.com/?apikey=${OMDB_KEY}&s=${encodeURIComponent(query)}&type=movie`);
            const data = await res.json();
            if(data.Search) {
                document.getElementById('searchResults').innerHTML = data.Search.map(m => `
                    <div class="bg-gray-800 p-2 rounded-xl cursor-pointer" onclick="openModal('${m.Title}')">
                        <img src="${m.Poster !== 'N/A' ? m.Poster : ''}" class="w-full h-48 object-cover rounded">
                        <p class="text-sm font-bold mt-2 truncate">${m.Title}</p>
                    </div>
                `).join('');
            }
        }

        function openModal(title) {
            document.getElementById('modalTitle').textContent = title;
            document.getElementById('mediaModal').classList.remove('hidden');
        }

        function renderLibrary() {
            document.getElementById('libGrid').innerHTML = library.map(m => `<div>${m.title}</div>`).join('');
        }

        window.onload = () => switchTab('search');
    </script>
</body>
</html>

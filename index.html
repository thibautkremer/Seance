<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TV TIME REBORN</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body { background-color: #111827; }
        .hide-scroll::-webkit-scrollbar { display: none; }
        .hidden { display: none; }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 font-sans pb-24">
    <header class="bg-gray-800 border-b border-gray-700 sticky top-0 z-50 px-4 py-3 flex justify-between items-center shadow-md">
        <h1 class="text-lg font-black text-indigo-400">TV TIME <span class="text-white text-xs px-2 py-0.5 bg-indigo-600 rounded">REBORN</span></h1>
        <span id="cloudStatus" class="text-[10px] px-2 py-0.5 bg-emerald-950 text-emerald-400 rounded-full font-bold">☁️ Actif</span>
    </header>

    <main id="main-content" class="max-w-md mx-auto p-4 w-full sm:max-w-2xl">
        </main>

    <div id="mediaModal" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-50 overflow-y-auto p-4 flex items-start justify-center hidden">
        <div class="bg-gray-800 border border-gray-700 w-full max-w-lg rounded-2xl overflow-hidden my-4">
            <div id="modalContent"></div>
            <button onclick="document.getElementById('mediaModal').classList.add('hidden')" class="w-full py-4 text-xs font-bold text-gray-400 border-t border-gray-700">FERMER</button>
        </div>
    </div>

    <nav class="fixed bottom-0 left-0 right-0 bg-gray-800 border-t border-gray-700 h-16 flex items-center justify-around z-40">
        <button onclick="loadView('search')">🔍</button>
        <button onclick="loadView('library')">📚</button>
        <button onclick="loadView('profile')">📊</button>
    </nav>
    <script>
        const TVMAZE_API = 'https://api.tvmaze.com';
        let library = JSON.parse(localStorage.getItem('tvtime_db')) || [];
        let currentMediaType = 'series';

        function loadView(view) {
            const content = document.getElementById('main-content');
            if(view === 'search') {
                content.innerHTML = `
                    <div class="grid grid-cols-2 gap-2 mb-4">
                        <button onclick="setMediaType('series')" class="bg-indigo-600 p-2 rounded">Séries</button>
                        <button onclick="setMediaType('movie')" class="bg-gray-800 p-2 rounded">Films</button>
                    </div>
                    <input type="text" oninput="handleSearch(this.value)" placeholder="Rechercher..." class="w-full bg-gray-800 p-3 rounded-xl mb-4">
                    <div id="results"></div>`;
            }
        }

        async function handleSearch(q) {
            if(q.length < 3) return;
            const res = currentMediaType === 'movie' 
                ? await fetch(`https://www.omdbapi.com/?apikey=1e01c814&s=${q}`).then(r=>r.json())
                : await fetch(`${TVMAZE_API}/search/shows?q=${q}`).then(r=>r.json());
            
            document.getElementById('results').innerHTML = (res.Search || res).map(item => `
                <div class="bg-gray-800 p-3 mb-2 rounded-xl cursor-pointer" onclick="openDetails('${item.Title || item.show.name}')">
                    ${item.Title || item.show.name}
                </div>
            `).join('');
        }

        function setMediaType(type) { currentMediaType = type; }
    </script>
    <script>
        function openDetails(title) {
            const modal = document.getElementById('mediaModal');
            document.getElementById('modalContent').innerHTML = `<h2 class="p-4 text-white font-bold">${title}</h2>`;
            modal.classList.remove('hidden');
        }

        function addToLibrary(media) {
            library.push(media);
            localStorage.setItem('tvtime_db', JSON.stringify(library));
        }

        // Initialisation
        window.onload = () => loadView('search');
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TV TIME REBORN - COMPLET</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body { background-color: #111827; -webkit-tap-highlight-color: transparent; }
        .hide-scroll::-webkit-scrollbar { display: none; }
        .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }
        /* Graphiques */
        .guide-line { position: absolute; left: 0; right: 0; border-top: 1px dashed rgba(234, 179, 8, 0.4); z-index: 0; }
        .bar-chart-container { position: relative; height: 100px; }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 font-sans pb-24">

    <header class="bg-gray-800 border-b border-gray-700 sticky top-0 z-50 px-4 py-3 flex justify-between items-center shadow-lg">
        <h1 class="text-lg font-black text-indigo-400">TV TIME <span class="text-white text-xs px-2 py-0.5 bg-indigo-600 rounded">REBORN</span></h1>
        <span id="cloudStatus" class="text-[10px] px-2 py-0.5 bg-emerald-950 text-emerald-400 rounded-full font-bold">☁️ Actif</span>
    </header>

    <main class="max-w-md mx-auto p-4 w-full sm:max-w-2xl">
        <div id="tab-search" class="space-y-4">
            <div class="grid grid-cols-3 gap-2 bg-gray-800 p-1 rounded-xl border border-gray-700">
                <button onclick="setMediaType('series')" id="btn-series" class="py-2 text-sm font-bold rounded-lg transition bg-indigo-600 text-white">Séries</button>
                <button onclick="setMediaType('movie')" id="btn-movie" class="py-2 text-sm font-bold rounded-lg transition text-gray-400">Films</button>
                <button onclick="setMediaType('anime')" id="btn-anime" class="py-2 text-sm font-bold rounded-lg transition text-gray-400">Animés</button>
            </div>
            <input type="text" id="searchInput" placeholder="Rechercher..." class="w-full bg-gray-800 border border-gray-700 rounded-xl px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-indigo-500" />
            <div id="searchError" class="text-red-400 text-sm bg-red-950/40 p-3 rounded-xl border border-red-900/50 hidden"></div>
            <div id="searchResults" class="space-y-3"></div>
        </div>

        <div id="tab-library" class="space-y-4 hidden">
            <h2 class="text-lg font-bold text-white">Ma Bibliothèque</h2>
            <div id="libraryGrid" class="grid grid-cols-3 gap-2"></div>
        </div>
    </main>
    <!-- Partie 2 : Moteur JavaScript et Logique -->
    <script>
        const OMDB_KEY = "1e01c814";
        const TVMAZE_API = 'https://api.tvmaze.com';
        const JIKAN_API = 'https://api.jikan.moe/v4';
        
        let currentMediaType = 'series';
        let unifiedSearchResults = [];
        let library = JSON.parse(localStorage.getItem('db')) || [];

        function setMediaType(type) {
            currentMediaType = type;
            ['series', 'movie', 'anime'].forEach(t => {
                const btn = document.getElementById(`btn-${t}`);
                if (btn) btn.className = `py-2 text-sm font-bold rounded-lg transition ${type === t ? 'bg-indigo-600 text-white' : 'text-gray-400'}`;
            });
        }

        async function triggerHybridSearch(val) {
            const query = val.trim();
            if (query.length < 2) return;
            
            let results = [];
            try {
                if (currentMediaType === 'movie') {
                    // Recherche OMDb pour les films
                    const res = await fetch(`https://www.omdbapi.com/?apikey=${OMDB_KEY}&s=${encodeURIComponent(query)}&type=movie`);
                    const data = await res.json();
                    results = (data.Search || []).map(m => ({
                        id: `movie-${m.imdbID}`, apiId: m.imdbID, title: m.Title, type: 'movie',
                        image: m.Poster !== 'N/A' ? m.Poster : 'https://via.placeholder.com/210x295?text=Pas+d%27image',
                        summary: 'Film', rating: 7.0, network: 'VOD'
                    }));
                } else if (currentMediaType === 'series') {
                    const res = await fetch(`${TVMAZE_API}/search/shows?q=${encodeURIComponent(query)}`);
                    const data = await res.json();
                    results = data.map(item => ({
                        id: `series-${item.show.id}`, apiId: item.show.id, title: item.show.name, type: 'series',
                        image: item.show.image?.medium, summary: item.show.summary?.replace(/<[^>]*>/g, ''), rating: item.show.rating?.average || 0
                    }));
                } else {
                    const res = await fetch(`${JIKAN_API}/anime?q=${encodeURIComponent(query)}`);
                    const data = await res.json();
                    results = (data.data || []).map(item => ({
                        id: `anime-${item.mal_id}`, apiId: item.mal_id, title: item.title, type: 'anime',
                        image: item.images?.jpg?.image_url, summary: item.synopsis, rating: item.score || 0
                    }));
                }
                displayResults(results);
            } catch (e) { console.error("Erreur recherche:", e); }
        }

        function displayResults(results) {
            const container = document.getElementById('searchResults');
            container.innerHTML = '';
            results.forEach(m => {
                const div = document.createElement('div');
                div.className = "bg-gray-800 p-3 rounded-xl cursor-pointer hover:border-indigo-500 border border-gray-700";
                div.onclick = () => openModal(m);
                div.innerHTML = `<h3 class="font-bold">${m.title}</h3>`;
                container.appendChild(div);
            });
        }
    </script>
    <!-- Partie 3 : Modale, Graphiques et Persistance -->
    <script>
        async function openModal(media) {
            document.getElementById('modalTitle').textContent = media.title;
            document.getElementById('mediaModal').classList.remove('hidden');
            renderGlobalGraph(media); // Génère les graphiques
            renderSuggestions(media);
        }

        // Graphique avec repères 5, 7.5 et 10
        function renderGlobalGraph(media) {
            const container = document.getElementById('modalGlobalGraph');
            container.innerHTML = `
                <div class="guide-line" style="top: 0%"></div> <!-- Repère 10 -->
                <div class="guide-line" style="top: 25%"></div> <!-- Repère 7.5 -->
                <div class="guide-line" style="top: 50%"></div> <!-- Repère 5 -->
            `;
            // Logique de rendu des barres ici...
        }

        // Suggestions persistantes : ne ferme pas la liste au clic
        async function renderSuggestions(media) {
            const container = document.getElementById('modalSuggestionsList');
            document.getElementById('modalSuggestionsBlock').classList.remove('hidden');
            container.innerHTML = '';
            
            // Simulation dynamique
            const suggestions = [{id: 's1', title: 'Film Similaire 1'}, {id: 's2', title: 'Film Similaire 2'}];
            suggestions.forEach(s => {
                const div = document.createElement('div');
                div.id = `sug-container-${s.id}`;
                div.className = "flex justify-between items-center p-2 bg-gray-800 rounded mb-2";
                div.innerHTML = `
                    <span class="text-xs text-white">${s.title}</span>
                    <button id="btn-${s.id}" onclick="markWatched('${s.id}')" class="bg-emerald-600 px-2 py-1 rounded text-xs text-white font-bold">Vu</button>
                `;
                container.appendChild(div);
            });
        }

        function markWatched(id) {
            const btn = document.getElementById(`btn-${id}`);
            if(btn) {
                // Change le bouton en texte "✓ Vu" sans fermer la liste
                btn.outerHTML = `<span class="text-xs text-emerald-400 font-bold">✓ Vu</span>`;
            }
        }

        function closeModal() { 
            document.getElementById('mediaModal').classList.add('hidden'); 
            renderLibrary(); 
        }

        document.getElementById('searchInput').addEventListener('input', (e) => triggerHybridSearch(e.target.value));
    </script>
</body>
</html>

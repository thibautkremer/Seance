<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
const { useState, useEffect, useCallback, useRef } = React;

const API_KEY = "1e01c814";
const OMDB = "https://www.omdbapi.com/";

// ---------- storage (plain localStorage — this is a normal webpage, not a sandboxed artifact) ----------
function loadLibrary() {
  try {
    const raw = localStorage.getItem("seance_library");
    return raw ? JSON.parse(raw) : [];
  } catch { return []; }
}
function saveLibrary(lib) {
  try { localStorage.setItem("seance_library", JSON.stringify(lib)); } catch (e) { console.error(e); }
}

// ---------- omdb helpers (no CORS proxy needed — real browser, real network) ----------
async function translateText(text, from, to) {
  try {
    const r = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=${from}|${to}`);
    const data = await r.json();
    const translated = data?.responseData?.translatedText;
    return translated && translated.toLowerCase() !== text.toLowerCase() ? translated : null;
  } catch { return null; }
}

async function omdbSearchRaw(query) {
  const [sRes, mRes] = await Promise.allSettled([
    fetch(`${OMDB}?apikey=${API_KEY}&type=series&s=${encodeURIComponent(query)}`).then(r => r.json()),
    fetch(`${OMDB}?apikey=${API_KEY}&type=movie&s=${encodeURIComponent(query)}`).then(r => r.json()),
  ]);
  const s = sRes.status === "fulfilled" ? sRes.value : { Search: [], Error: "Connexion à OMDb impossible" };
  const m = mRes.status === "fulfilled" ? mRes.value : { Search: [], Error: "Connexion à OMDb impossible" };
  const results = [...(s.Search || []), ...(m.Search || [])];
  const error = results.length === 0 ? (s.Error || m.Error || null) : null;
  return { results, error };
}

async function omdbSearch(query, lang = "en") {
  const queries = [query];
  if (lang === "fr") {
    const translated = await translateText(query, "fr", "en");
    if (translated) queries.unshift(translated);
  }
  let combined = [];
  let lastError = null;
  const seen = new Set();
  for (const q of queries) {
    const { results, error } = await omdbSearchRaw(q);
    if (error) lastError = error;
    for (const r of results) {
      if (!seen.has(r.imdbID)) { seen.add(r.imdbID); combined.push(r); }
    }
  }
  // cap to top 10, series/movies interleaved in relevance order
  return { results: combined.slice(0, 10), error: combined.length === 0 ? lastError : null };
}
async function omdbDetails(imdbID) {
  const r = await fetch(`${OMDB}?apikey=${API_KEY}&i=${imdbID}&plot=short`);
  return r.json();
}
async function omdbSeason(imdbID, season) {
  const r = await fetch(`${OMDB}?apikey=${API_KEY}&i=${imdbID}&Season=${season}`);
  return r.json();
}

function parseDate(d) {
  if (!d || d === "N/A") return null;
  const t = Date.parse(d);
  return isNaN(t) ? null : new Date(t);
}
function fmtDate(d) {
  if (!d) return "Date inconnue";
  return d.toLocaleDateString("fr-FR", { day: "2-digit", month: "short", year: "numeric" });
}
function todayMidnight() { const n = new Date(); n.setHours(0,0,0,0); return n; }

const STATUS = {
  watching: { label: "En cours", color: "#C0392B" },
  planned: { label: "À voir", color: "#8A8272" },
  completed: { label: "Terminé", color: "#4B7A51" },
  dropped: { label: "Abandonné", color: "#5A5248" },
};

// ---------- lightweight inline icon set (no external icon library needed) ----------
function Icon({ name, size = 16, color = "currentColor", fill = "none" }) {
  const s = { width: size, height: size, display: "block" };
  const common = { viewBox: "0 0 24 24", fill: "none", stroke: color, strokeWidth: 2, strokeLinecap: "round", strokeLinejoin: "round" };
  switch (name) {
    case "search": return <svg {...common} style={s}><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.5" y2="16.5"/></svg>;
    case "plus": return <svg {...common} style={s}><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>;
    case "film": return <svg {...common} style={s}><rect x="3" y="4" width="18" height="16" rx="1"/><line x1="8" y1="4" x2="8" y2="20"/><line x1="16" y1="4" x2="16" y2="20"/></svg>;
    case "tv": return <svg {...common} style={s}><rect x="3" y="6" width="18" height="13" rx="1"/><line x1="8" y1="22" x2="16" y2="22"/><line x1="12" y1="19" x2="12" y2="22"/></svg>;
    case "calendar": return <svg {...common} style={s}><rect x="3" y="5" width="18" height="16" rx="1"/><line x1="3" y1="10" x2="21" y2="10"/><line x1="8" y1="3" x2="8" y2="7"/><line x1="16" y1="3" x2="16" y2="7"/></svg>;
    case "upload": return <svg {...common} style={s}><path d="M12 16V4"/><path d="M6 10l6-6 6 6"/><path d="M4 20h16"/></svg>;
    case "star": return <svg viewBox="0 0 24 24" style={s} fill={fill} stroke={color} strokeWidth="1.5"><polygon points="12,2 15,9 22,9.5 17,14.5 18.5,22 12,18 5.5,22 7,14.5 2,9.5 9,9"/></svg>;
    case "check": return <svg {...common} style={s}><polyline points="20 6 9 17 4 12"/></svg>;
    case "x": return <svg {...common} style={s}><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>;
    case "chevron-down": return <svg {...common} style={s}><polyline points="6 9 12 15 18 9"/></svg>;
    case "chevron-right": return <svg {...common} style={s}><polyline points="9 6 15 12 9 18"/></svg>;
    case "trash": return <svg {...common} style={s}><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M8 6V4h8v2"/></svg>;
    case "loader": return <svg {...common} style={s} className="spin"><circle cx="12" cy="12" r="8" opacity="0.25"/><path d="M12 4a8 8 0 018 8"/></svg>;
    case "ticket": return <svg {...common} style={s}><path d="M3 8a2 2 0 012-2h14a2 2 0 012 2v2a2 2 0 000 4v2a2 2 0 01-2 2H5a2 2 0 01-2-2v-2a2 2 0 000-4V8z"/><line x1="12" y1="6" x2="12" y2="18" strokeDasharray="2 3"/></svg>;
    case "play": return <svg viewBox="0 0 24 24" style={s} fill={color} stroke="none"><polygon points="6,4 20,12 6,20"/></svg>;
    default: return null;
  }
}

// ---------- simple SVG rating-curve chart (no charting library needed) ----------
function RatingCurve({ data }) {
  const W = 640, H = 220, PAD_L = 34, PAD_B = 28, PAD_T = 12, PAD_R = 12;
  const innerW = W - PAD_L - PAD_R, innerH = H - PAD_T - PAD_B;
  const n = data.length;
  const avg = data.reduce((a, b) => a + b.value, 0) / n;
  const x = (i) => PAD_L + (n === 1 ? innerW / 2 : (i / (n - 1)) * innerW);
  const y = (v) => PAD_T + innerH - (v / 10) * innerH;
  const points = data.map((d, i) => `${x(i)},${y(d.value)}`).join(" ");
  const step = Math.max(1, Math.ceil(n / 8));
  return (
    <svg viewBox={`0 0 ${W} ${H}`} style={{ width: "100%", height: 220 }}>
      {[0,2.5,5,7.5,10].map(v => (
        <g key={v}>
          <line x1={PAD_L} x2={W-PAD_R} y1={y(v)} y2={y(v)} stroke="#2A251D" strokeDasharray="3 3" />
          <text x={PAD_L - 8} y={y(v)+3} fontSize="9" fill="#8A8272" fontFamily="IBM Plex Mono" textAnchor="end">{v}</text>
        </g>
      ))}
      <line x1={PAD_L} x2={W-PAD_R} y1={y(avg)} y2={y(avg)} stroke="#5A5248" strokeDasharray="4 4" />
      {data.map((d, i) => i % step === 0 && (
        <text key={i} x={x(i)} y={H-8} fontSize="9" fill="#8A8272" fontFamily="IBM Plex Mono" textAnchor="middle">{d.label}</text>
      ))}
      <polyline points={points} fill="none" stroke="#D4A24C" strokeWidth="2" />
      {data.map((d, i) => (
        <circle key={i} cx={x(i)} cy={y(d.value)} r="3" fill="#D4A24C">
          <title>{`${d.label} — ${d.value}`}</title>
        </circle>
      ))}
    </svg>
  );
}

// ---------- Ticket stub visual wrapper ----------
function TicketCard({ item, onClick, onRemove }) {
  const st = STATUS[item.status] || STATUS.planned;
  return (
    <div onClick={onClick} style={{ background: "#F2E8D5", color: "#201C16", borderRadius: 4, position: "relative", cursor: "pointer", display: "flex", overflow: "hidden", boxShadow: "0 3px 0 rgba(0,0,0,0.25)" }}>
      <div style={{ width: 70, minWidth: 70, height: 104, overflow: "hidden", background: "#14120F" }}>
        {item.poster && item.poster !== "N/A" ? <img src={item.poster} alt="" style={{ width: "100%", height: "100%", objectFit: "cover" }} /> :
          <div style={{ width: "100%", height: "100%", display: "flex", alignItems: "center", justifyContent: "center", color: "#8A8272" }}><Icon name={item.type === "movie" ? "film" : "tv"} size={20} /></div>}
      </div>
      <div style={{ width: 0, borderLeft: "2px dashed #C9BC9C", position: "relative" }}>
        <div style={{ position: "absolute", top: -6, left: -6, width: 12, height: 12, background: "#14120F", borderRadius: "50%" }} />
        <div style={{ position: "absolute", bottom: -6, left: -6, width: 12, height: 12, background: "#14120F", borderRadius: "50%" }} />
      </div>
      <div style={{ flex: 1, padding: "10px 12px", display: "flex", flexDirection: "column", justifyContent: "space-between", minWidth: 0 }}>
        <div>
          <div style={{ fontFamily: "'Fraunces', serif", fontWeight: 600, fontSize: 14.5, lineHeight: 1.2, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{item.title}</div>
          <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "#7A7263", marginTop: 3 }}>{item.year}</div>
        </div>
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginTop: 6 }}>
          <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, letterSpacing: "0.04em", textTransform: "uppercase", color: "#fff", background: st.color, padding: "2px 6px", borderRadius: 3 }}>{st.label}</span>
          {item.userRating ? <span style={{ display: "flex", alignItems: "center", gap: 2, fontFamily: "'IBM Plex Mono', monospace", fontSize: 12, color: "#D4A24C" }}><Icon name="star" size={11} color="#D4A24C" fill="#D4A24C" /> {item.userRating}</span> : null}
        </div>
      </div>
      {onRemove && (
        <button onClick={(e) => { e.stopPropagation(); onRemove(item.id); }} style={{ position: "absolute", top: 4, right: 4, background: "transparent", border: "none", color: "#B0A78E", cursor: "pointer", padding: 4 }} title="Retirer">
          <Icon name="trash" size={13} />
        </button>
      )}
    </div>
  );
}

// ---------- Search / Add view ----------
function SearchView({ onAdd, library }) {
  const [query, setQuery] = useState("");
  const [lang, setLang] = useState("fr");
  const [results, setResults] = useState([]);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState(null);
  const debounceRef = useRef(null);

  useEffect(() => {
    if (!query.trim()) { setResults([]); setError(null); return; }
    clearTimeout(debounceRef.current);
    debounceRef.current = setTimeout(async () => {
      setLoading(true); setError(null);
      try {
        const { results: r, error: e } = await omdbSearch(query.trim(), lang);
        setResults(r); setError(e);
      } catch (err) { setResults([]); setError(err.message || "Erreur inconnue"); }
      setLoading(false);
    }, 300);
    return () => clearTimeout(debounceRef.current);
  }, [query, lang]);

  const inLib = (id) => library.some(l => l.id === id);

  return (
    <div>
      <div style={{ display: "flex", gap: 10, marginBottom: 12 }}>
        <div style={{ position: "relative", flex: 1 }}>
          <span style={{ position: "absolute", left: 14, top: "50%", transform: "translateY(-50%)", color: "#8A8272" }}><Icon name="search" size={16} /></span>
          <input value={query} onChange={e => setQuery(e.target.value)} placeholder="Chercher une série, un film, un animé…"
            style={{ width: "100%", padding: "12px 14px 12px 38px", background: "#1E1B16", border: "1px solid #383226", borderRadius: 6, color: "#F2E8D5", fontSize: 14, boxSizing: "border-box" }} />
          {loading && <span style={{ position: "absolute", right: 14, top: "50%", transform: "translateY(-50%)", color: "#8A8272" }}><Icon name="loader" size={16} /></span>}
        </div>
        <div style={{ display: "flex", border: "1px solid #383226", borderRadius: 6, overflow: "hidden", flexShrink: 0 }}>
          {[["fr","FR"],["en","EN"]].map(([key,label]) => (
            <button key={key} onClick={() => setLang(key)} style={{ background: lang===key?"#C0392B":"#1E1B16", color: lang===key?"#fff":"#8A8272", border: "none", padding: "0 16px", fontFamily: "'IBM Plex Mono', monospace", fontSize: 12, cursor: "pointer" }}>{label}</button>
          ))}
        </div>
      </div>
      {lang === "fr" && <div style={{ color: "#5A5248", fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, marginBottom: 14 }}>Requête traduite en anglais avant recherche · résultats limités aux 10 meilleures correspondances, séries/films/animés mélangés.</div>}
      {error && !loading && query && <div style={{ color: "#C0392B", fontFamily: "'IBM Plex Mono', monospace", fontSize: 12, marginBottom: 14 }}>{error === "Movie not found!" ? `Aucun résultat pour « ${query} ».` : `Erreur OMDb : ${error}`}</div>}
      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(260px,1fr))", gap: 12 }}>
        {results.map(r => (
          <div key={r.imdbID} style={{ background: "#1E1B16", border: "1px solid #302B22", borderRadius: 6, display: "flex", gap: 10, padding: 10, alignItems: "center" }}>
            <div style={{ width: 42, height: 60, background: "#0E0C0A", flexShrink: 0, overflow: "hidden", borderRadius: 3 }}>
              {r.Poster && r.Poster !== "N/A" ? <img src={r.Poster} alt="" style={{ width: "100%", height: "100%", objectFit: "cover" }} /> :
                <div style={{ width: "100%", height: "100%", display: "flex", alignItems: "center", justifyContent: "center", color: "#4A4438" }}><Icon name={r.Type === "movie" ? "film" : "tv"} size={16} /></div>}
            </div>
            <div style={{ flex: 1, minWidth: 0 }}>
              <div style={{ color: "#F2E8D5", fontSize: 13.5, fontWeight: 600, fontFamily: "'Fraunces', serif", whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{r.Title}</div>
              <div style={{ color: "#8A8272", fontSize: 11, fontFamily: "'IBM Plex Mono', monospace", marginTop: 2 }}>{r.Year} · {r.Type === "movie" ? "Film" : "Série"}</div>
            </div>
            <button disabled={inLib(r.imdbID)} onClick={() => onAdd(r)} style={{ background: inLib(r.imdbID)?"#2E2A21":"#C0392B", color: inLib(r.imdbID)?"#8A8272":"#F2E8D5", border: "none", borderRadius: 4, padding: "6px 10px", cursor: inLib(r.imdbID)?"default":"pointer", flexShrink: 0 }}>
              <Icon name={inLib(r.imdbID) ? "check" : "plus"} size={13} />
            </button>
          </div>
        ))}
        {!loading && query && results.length === 0 && !error && <div style={{ color: "#8A8272", fontFamily: "'IBM Plex Mono', monospace", fontSize: 13 }}>Aucun résultat pour « {query} ».</div>}
      </div>
    </div>
  );
}

const backBtnStyle = { background: "none", border: "none", color: "#8A8272", cursor: "pointer", fontFamily: "'IBM Plex Mono', monospace", fontSize: 12, padding: 0 };
const sectionTitleStyle = { fontFamily: "'Fraunces', serif", color: "#F2E8D5", fontSize: 17, margin: 0 };
const pillBtn = (active) => ({ background: active?"#C0392B":"transparent", color: active?"#fff":"#8A8272", border: `1px solid ${active?"#C0392B":"#383226"}`, borderRadius: 20, padding: "3px 10px", fontSize: 11, fontFamily: "'IBM Plex Mono', monospace", cursor: "pointer" });

// ---------- Show Detail ----------
function ShowDetail({ item, onUpdate, onClose }) {
  const [seasonsOpen, setSeasonsOpen] = useState({});
  const [loadingSeason, setLoadingSeason] = useState(null);
  const [chartMode, setChartMode] = useState("imdb");
  const isMovie = item.type === "movie";

  const ensureSeason = useCallback(async (seasonNum) => {
    if (item.episodesData && item.episodesData[seasonNum]) return;
    setLoadingSeason(seasonNum);
    const data = await omdbSeason(item.id, seasonNum);
    const episodes = (data.Episodes || []).map(e => ({ episode: parseInt(e.Episode,10), title: e.Title, released: e.Released, imdbRating: e.imdbRating && e.imdbRating !== "N/A" ? parseFloat(e.imdbRating) : null, watched: false, userRating: null }));
    onUpdate({ ...item, episodesData: { ...(item.episodesData||{}), [seasonNum]: episodes } });
    setLoadingSeason(null);
  }, [item, onUpdate]);

  useEffect(() => { if (!isMovie && item.totalSeasons) ensureSeason(1); }, []);

  const toggleSeason = (n) => { setSeasonsOpen(s => ({ ...s, [n]: !s[n] })); ensureSeason(n); };
  const toggleWatched = (sn, idx) => { const eps=[...item.episodesData[sn]]; eps[idx]={...eps[idx], watched:!eps[idx].watched}; onUpdate({...item, episodesData:{...item.episodesData,[sn]:eps}}); };
  const rateEpisode = (sn, idx, val) => { const eps=[...item.episodesData[sn]]; eps[idx]={...eps[idx], userRating: val}; onUpdate({...item, episodesData:{...item.episodesData,[sn]:eps}}); };
  const setStatus = (status) => onUpdate({ ...item, status });
  const setShowRating = (val) => onUpdate({ ...item, userRating: val });

  const chartData = [];
  if (item.episodesData) {
    Object.keys(item.episodesData).sort((a,b)=>a-b).forEach(sn => {
      item.episodesData[sn].forEach(ep => {
        const val = chartMode === "imdb" ? ep.imdbRating : ep.userRating;
        if (val !== null && val !== undefined) chartData.push({ label: `S${sn}E${ep.episode}`, value: val });
      });
    });
  }

  return (
    <div>
      <button onClick={onClose} style={backBtnStyle}>← Retour</button>
      <div style={{ display: "flex", gap: 20, marginTop: 16, flexWrap: "wrap" }}>
        <div style={{ width: 140, height: 200, flexShrink: 0, borderRadius: 6, overflow: "hidden", background: "#14120F" }}>
          {item.poster && item.poster !== "N/A" && <img src={item.poster} alt="" style={{ width: "100%", height: "100%", objectFit: "cover" }} />}
        </div>
        <div style={{ flex: 1, minWidth: 220 }}>
          <h2 style={{ fontFamily: "'Fraunces', serif", fontSize: 26, color: "#F2E8D5", margin: "0 0 4px" }}>{item.title}</h2>
          <div style={{ color: "#8A8272", fontFamily: "'IBM Plex Mono', monospace", fontSize: 12, marginBottom: 14 }}>{item.year} · {isMovie ? "Film" : `${item.totalSeasons || "?"} saison(s)`}</div>
          <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginBottom: 14 }}>
            {Object.entries(STATUS).map(([key,s]) => (
              <button key={key} onClick={() => setStatus(key)} style={{ background: item.status===key?s.color:"transparent", color: item.status===key?"#fff":"#8A8272", border: `1px solid ${item.status===key?s.color:"#383226"}`, borderRadius: 4, padding: "5px 10px", fontSize: 11.5, fontFamily: "'IBM Plex Mono', monospace", cursor: "pointer", textTransform: "uppercase" }}>{s.label}</button>
            ))}
          </div>
          <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
            <span style={{ color: "#8A8272", fontSize: 12, fontFamily: "'IBM Plex Mono', monospace" }}>Ma note :</span>
            {[...Array(10)].map((_,i) => (
              <span key={i} onClick={() => setShowRating(i+1)} style={{ cursor: "pointer" }}><Icon name="star" size={15} color={item.userRating>i?"#D4A24C":"#5A5248"} fill={item.userRating>i?"#D4A24C":"none"} /></span>
            ))}
            {item.userRating ? <span style={{ color: "#D4A24C", fontFamily: "'IBM Plex Mono', monospace", fontSize: 12 }}>{item.userRating}/10</span> : null}
          </div>
        </div>
      </div>

      {!isMovie && (
        <>
          {chartData.length > 1 && (
            <div style={{ marginTop: 28 }}>
              <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 8, flexWrap: "wrap", gap: 8 }}>
                <h3 style={sectionTitleStyle}>Courbe des notes</h3>
                <div style={{ display: "flex", gap: 6 }}>
                  <button onClick={() => setChartMode("imdb")} style={pillBtn(chartMode==="imdb")}>Notes IMDb</button>
                  <button onClick={() => setChartMode("mine")} style={pillBtn(chartMode==="mine")}>Mes notes</button>
                </div>
              </div>
              <RatingCurve data={chartData} />
            </div>
          )}

          <div style={{ marginTop: 28 }}>
            <h3 style={sectionTitleStyle}>Saisons</h3>
            {Array.from({ length: item.totalSeasons || 1 }, (_,i) => i+1).map(sn => (
              <div key={sn} style={{ marginBottom: 8, border: "1px solid #302B22", borderRadius: 6, overflow: "hidden" }}>
                <div onClick={() => toggleSeason(sn)} style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "10px 14px", background: "#1E1B16", cursor: "pointer" }}>
                  <span style={{ color: "#F2E8D5", fontFamily: "'Fraunces', serif", fontSize: 14.5 }}>Saison {sn}</span>
                  {loadingSeason===sn ? <Icon name="loader" size={14} color="#8A8272" /> : <Icon name={seasonsOpen[sn]?"chevron-down":"chevron-right"} size={16} color="#8A8272" />}
                </div>
                {seasonsOpen[sn] && item.episodesData && item.episodesData[sn] && (
                  <div>
                    {item.episodesData[sn].map((ep, idx) => (
                      <div key={ep.episode} style={{ display: "flex", alignItems: "center", gap: 10, padding: "8px 14px", borderTop: "1px solid #221E17", flexWrap: "wrap" }}>
                        <button onClick={() => toggleWatched(sn, idx)} style={{ background: "none", border: "none", cursor: "pointer", padding: 0 }}>
                          <div style={{ width: 18, height: 18, borderRadius: "50%", border: `1.5px solid ${ep.watched?"#4B7A51":"#5A5248"}`, background: ep.watched?"#4B7A51":"transparent", display: "flex", alignItems: "center", justifyContent: "center" }}>
                            {ep.watched && <Icon name="check" size={11} color="#fff" />}
                          </div>
                        </button>
                        <span style={{ color: "#8A8272", fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, width: 26 }}>E{ep.episode}</span>
                        <span style={{ color: "#F2E8D5", fontSize: 13, flex: 1, minWidth: 100, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{ep.title}</span>
                        <span style={{ color: "#5A5248", fontFamily: "'IBM Plex Mono', monospace", fontSize: 10.5 }}>{ep.released || "—"}</span>
                        {ep.imdbRating && <span style={{ color: "#D4A24C", fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, display: "flex", alignItems: "center", gap: 2 }}><Icon name="star" size={10} color="#D4A24C" fill="#D4A24C" /> {ep.imdbRating}</span>}
                        <select value={ep.userRating || ""} onChange={e => rateEpisode(sn, idx, e.target.value?parseInt(e.target.value,10):null)} style={{ background: "#14120F", color: "#F2E8D5", border: "1px solid #383226", borderRadius: 3, fontSize: 11, fontFamily: "IBM Plex Mono", padding: "2px 4px" }}>
                          <option value="">–</option>
                          {[...Array(10)].map((_,i) => <option key={i} value={i+1}>{i+1}</option>)}
                        </select>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            ))}
          </div>
        </>
      )}
    </div>
  );
}

// ---------- Calendar view ----------
function CalendarView({ library, onOpen }) {
  const today = todayMidnight();
  const upcoming = [], recent = [];
  library.forEach(item => {
    if (item.type === "movie" || !item.episodesData) return;
    Object.entries(item.episodesData).forEach(([sn, eps]) => {
      eps.forEach(ep => {
        const d = parseDate(ep.released);
        if (!d) return;
        const entry = { item, season: sn, ep, date: d };
        if (d.getTime() >= today.getTime()) upcoming.push(entry);
        else if (!ep.watched) recent.push(entry);
      });
    });
  });
  upcoming.sort((a,b) => a.date - b.date);
  recent.sort((a,b) => b.date - a.date);

  const Row = ({ e }) => (
    <div onClick={() => onOpen(e.item)} style={{ display: "flex", alignItems: "center", gap: 12, padding: "10px 14px", background: "#1E1B16", borderRadius: 6, marginBottom: 8, cursor: "pointer" }}>
      <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "#D4A24C", background: "#14120F", borderRadius: 4, padding: "6px 8px", textAlign: "center", minWidth: 62 }}>{fmtDate(e.date)}</div>
      <div style={{ flex: 1, minWidth: 0 }}>
        <div style={{ color: "#F2E8D5", fontSize: 13.5, fontFamily: "'Fraunces', serif", whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{e.item.title}</div>
        <div style={{ color: "#8A8272", fontSize: 11, fontFamily: "'IBM Plex Mono', monospace" }}>S{e.season}E{e.ep.episode} — {e.ep.title}</div>
      </div>
    </div>
  );

  return (
    <div>
      <h3 style={{ ...sectionTitleStyle, marginBottom: 10 }}>À venir</h3>
      {upcoming.length === 0 && <div style={{ color: "#5A5248", fontFamily: "'IBM Plex Mono', monospace", fontSize: 12.5, marginBottom: 20 }}>Aucune date future connue. OMDb ne référence que les épisodes déjà programmés/diffusés — ouvre une série pour charger ses saisons.</div>}
      {upcoming.map((e,i) => <Row key={i} e={e} />)}
      {recent.length > 0 && (<><h3 style={{ ...sectionTitleStyle, marginTop: 26, marginBottom: 10 }}>En retard (diffusés, non vus)</h3>{recent.slice(0,20).map((e,i) => <Row key={i} e={e} />)}</>)}
    </div>
  );
}

// ---------- Import view ----------
function ImportView({ library, onImportConfirm }) {
  const [grouped, setGrouped] = useState([]);
  const [rawCount, setRawCount] = useState(0);
  const [step, setStep] = useState("upload");
  const fileRef = useRef(null);

  const detectField = (row, candidates) => {
    const keys = Object.keys(row);
    for (const c of candidates) { const found = keys.find(k => k.toLowerCase().replace(/[^a-z]/g,"") === c); if (found) return row[found]; }
    return null;
  };

  const handleFile = (file) => {
    const isJson = file.name.toLowerCase().endsWith(".json");
    const reader = new FileReader();
    reader.onload = (e) => {
      let rows = [];
      if (isJson) {
        try {
          const data = JSON.parse(e.target.result);
          const arr = Array.isArray(data) ? data : (data.history || data.episodes || []);
          rows = arr.map(r => ({ show: r.show?.title || r.series_title || r.show_name || r.title || r.Show || "", season: r.episode?.season || r.season_number || r.Season || r.season || "", episode: r.episode?.number || r.episode_number || r.Episode || r.episode || "", date: r.watched_at || r.watched_date || r.date || r.WatchedDate || "", rating: r.rating || r.Rating || "" }));
        } catch { rows = []; }
      } else {
        const parsed = Papa.parse(e.target.result, { header: true, skipEmptyLines: true });
        rows = parsed.data.map(row => ({ show: detectField(row, ["showname","seriestitle","show","title","seriesname","name"]), season: detectField(row, ["seasonnumber","season","seasonno"]), episode: detectField(row, ["episodenumber","episode","episodeno","epnumber"]), date: detectField(row, ["watchedat","watcheddate","date","dateviewed","watched"]), rating: detectField(row, ["rating","userrating","note"]) }));
      }
      rows = rows.filter(r => r.show && String(r.show).trim());
      setRawCount(rows.length);
      const map = {};
      rows.forEach(r => { const key = String(r.show).trim(); if (!map[key]) map[key]=[]; map[key].push(r); });
      setGrouped(Object.entries(map).map(([title,rows]) => ({ title, rows, match: null, searching: false, selected: true })));
      setStep("matching");
    };
    reader.readAsText(file);
  };

  const runMatching = async () => {
    const updated = [...grouped];
    for (let i=0;i<updated.length;i++) {
      updated[i].searching = true; setGrouped([...updated]);
      try { const { results } = await omdbSearch(updated[i].title); updated[i].match = results[0]||null; updated[i].candidates = results.slice(0,5); }
      catch { updated[i].match = null; }
      updated[i].searching = false; setGrouped([...updated]);
    }
  };

  const confirmImport = () => { onImportConfirm(grouped.filter(g => g.selected && g.match)); setStep("done"); };

  if (step === "upload") return (
    <div>
      <h3 style={sectionTitleStyle}>Importer depuis TV Time ou Trakt</h3>
      <p style={{ color: "#8A8272", fontFamily: "'IBM Plex Mono', monospace", fontSize: 12.5, lineHeight: 1.6, maxWidth: 560 }}>Exporte tes données (CSV ou JSON) depuis TV Time (export GDPR dans l'appli) ou Trakt (paramètres → export), puis dépose le fichier ici.</p>
      <div onClick={() => fileRef.current?.click()} onDragOver={e => e.preventDefault()} onDrop={e => { e.preventDefault(); if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]); }}
        style={{ marginTop: 16, border: "2px dashed #383226", borderRadius: 8, padding: 40, textAlign: "center", cursor: "pointer", color: "#8A8272" }}>
        <div style={{ display:"flex", justifyContent:"center", marginBottom: 8 }}><Icon name="upload" size={28} /></div>
        <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 12.5 }}>Glisse un fichier .csv ou .json ici, ou clique pour choisir</div>
        <input ref={fileRef} type="file" accept=".csv,.json" style={{ display: "none" }} onChange={e => e.target.files[0] && handleFile(e.target.files[0])} />
      </div>
    </div>
  );

  if (step === "matching") {
    const alreadyMatched = grouped.some(g => g.match !== null || g.candidates);
    return (
      <div>
        <h3 style={sectionTitleStyle}>{grouped.length} série(s)/film(s) détecté(s) — {rawCount} ligne(s)</h3>
        {!alreadyMatched && <button onClick={runMatching} style={{ ...pillBtn(true), padding: "8px 16px", marginTop: 10, marginBottom: 16 }}>Lancer la correspondance OMDb</button>}
        <div style={{ maxHeight: 420, overflowY: "auto", marginTop: 10 }}>
          {grouped.map((g,i) => (
            <div key={g.title} style={{ display: "flex", alignItems: "center", gap: 10, padding: "8px 12px", background: "#1E1B16", borderRadius: 6, marginBottom: 6, flexWrap: "wrap" }}>
              <input type="checkbox" checked={g.selected} onChange={() => { const u=[...grouped]; u[i].selected=!u[i].selected; setGrouped(u); }} />
              <div style={{ flex: 1, minWidth: 120 }}>
                <div style={{ color: "#F2E8D5", fontSize: 13, fontFamily: "'Fraunces', serif" }}>{g.title}</div>
                <div style={{ color: "#5A5248", fontSize: 10.5, fontFamily: "'IBM Plex Mono', monospace" }}>{g.rows.length} ligne(s)</div>
              </div>
              {g.searching && <Icon name="loader" size={14} color="#8A8272" />}
              {!g.searching && g.candidates && (
                <select value={g.match?.imdbID||""} onChange={e => { const u=[...grouped]; u[i].match = u[i].candidates.find(c=>c.imdbID===e.target.value)||null; setGrouped(u); }}
                  style={{ background: "#14120F", color: "#F2E8D5", border: "1px solid #383226", borderRadius: 4, fontSize: 11.5, fontFamily: "IBM Plex Mono", padding: "4px 6px", maxWidth: 200 }}>
                  <option value="">Aucune correspondance</option>
                  {g.candidates.map(c => <option key={c.imdbID} value={c.imdbID}>{c.Title} ({c.Year})</option>)}
                </select>
              )}
            </div>
          ))}
        </div>
        {alreadyMatched && <button onClick={confirmImport} style={{ ...pillBtn(true), padding: "10px 20px", marginTop: 16, fontSize: 12.5 }}>Importer {grouped.filter(g=>g.selected&&g.match).length} titre(s) dans ma bibliothèque</button>}
      </div>
    );
  }

  return (
    <div style={{ textAlign: "center", padding: 40 }}>
      <div style={{ display:"flex", justifyContent:"center", marginBottom: 10 }}><Icon name="check" size={36} color="#4B7A51" /></div>
      <div style={{ color: "#F2E8D5", fontFamily: "'Fraunces', serif", fontSize: 16 }}>Import terminé.</div>
      <div style={{ color: "#8A8272", fontFamily: "'IBM Plex Mono', monospace", fontSize: 12, marginTop: 6 }}>Retrouve les titres dans ta bibliothèque.</div>
    </div>
  );
}

// ---------- App shell ----------
function App() {
  const [library, setLibrary] = useState(loadLibrary());
  const [view, setView] = useState("library");
  const [selected, setSelected] = useState(null);

  useEffect(() => { saveLibrary(library); }, [library]);

  const addItem = async (searchResult) => {
    const details = await omdbDetails(searchResult.imdbID);
    const item = { id: searchResult.imdbID, title: details.Title, year: details.Year, poster: details.Poster, type: searchResult.Type==="movie"?"movie":"series", status: "planned", userRating: null, addedAt: new Date().toISOString(), totalSeasons: details.totalSeasons?parseInt(details.totalSeasons,10):null, episodesData: {} };
    setLibrary(lib => [...lib, item]);
  };
  const updateItem = (updated) => { setLibrary(lib => lib.map(i => i.id===updated.id?updated:i)); setSelected(updated); };
  const removeItem = (id) => setLibrary(lib => lib.filter(i => i.id !== id));

  const handleImportConfirm = async (groups) => {
    const newItems = [];
    for (const g of groups) {
      if (library.some(l=>l.id===g.match.imdbID) || newItems.some(n=>n.id===g.match.imdbID)) continue;
      const details = await omdbDetails(g.match.imdbID);
      const type = g.match.Type==="movie"?"movie":"series";
      const episodesData = {}; let userRating = null;
      g.rows.forEach(r => {
        if (r.rating && !isNaN(parseFloat(r.rating))) userRating = parseFloat(r.rating);
        if (r.season && r.episode) { const sn=parseInt(r.season,10); if(!episodesData[sn]) episodesData[sn]=[]; episodesData[sn].push({ episode: parseInt(r.episode,10), watched: true, userRating: r.rating?parseFloat(r.rating):null, title: "", released: r.date||null, imdbRating: null }); }
      });
      newItems.push({ id: g.match.imdbID, title: details.Title, year: details.Year, poster: details.Poster, type, status: "completed", userRating, addedAt: new Date().toISOString(), totalSeasons: details.totalSeasons?parseInt(details.totalSeasons,10):null, episodesData, importedFromExternal: true });
    }
    setLibrary(lib => [...lib, ...newItems]);
  };

  const navItem = (key, icon, label) => (
    <button onClick={() => { setView(key); setSelected(null); }} style={{ display: "flex", alignItems: "center", gap: 6, background: view===key&&!selected?"#C0392B":"transparent", color: view===key&&!selected?"#fff":"#B0A78E", border: "none", borderRadius: 5, padding: "8px 12px", fontFamily: "'IBM Plex Mono', monospace", fontSize: 12, cursor: "pointer", textTransform: "uppercase" }}>
      <Icon name={icon} size={14} /> {label}
    </button>
  );

  return (
    <div style={{ minHeight: "100vh", background: "#14120F" }}>
      <div style={{ borderBottom: "1px solid #241F17", padding: "16px 24px", display: "flex", alignItems: "center", justifyContent: "space-between", flexWrap: "wrap", gap: 12 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
          <Icon name="ticket" size={20} color="#D4A24C" />
          <span style={{ fontFamily: "'Fraunces', serif", fontWeight: 700, fontSize: 19, color: "#F2E8D5" }}>Séance</span>
        </div>
        <nav style={{ display: "flex", gap: 4 }}>
          {navItem("library","play","Bibliothèque")}
          {navItem("search","search","Ajouter")}
          {navItem("calendar","calendar","Calendrier")}
          {navItem("import","upload","Import")}
        </nav>
      </div>
      <div style={{ maxWidth: 980, margin: "0 auto", padding: "28px 24px 60px" }}>
        {selected ? <ShowDetail item={selected} onUpdate={updateItem} onClose={() => setSelected(null)} /> :
          view === "library" ? (
            library.length === 0 ? (
              <div style={{ textAlign: "center", padding: "60px 0", color: "#5A5248" }}>
                <div style={{ display:"flex", justifyContent:"center", marginBottom: 10 }}><Icon name="ticket" size={32} /></div>
                <div style={{ fontFamily: "'Fraunces', serif", fontSize: 16, color: "#8A8272" }}>Ta bibliothèque est vide.</div>
                <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 12, marginTop: 6 }}>Ajoute un titre ou importe tes données existantes.</div>
              </div>
            ) : (
              <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(280px,1fr))", gap: 14 }}>
                {library.slice().sort((a,b) => new Date(b.addedAt)-new Date(a.addedAt)).map(item => <TicketCard key={item.id} item={item} onClick={() => setSelected(item)} onRemove={removeItem} />)}
              </div>
            )
          ) : view === "search" ? <SearchView onAdd={addItem} library={library} /> :
          view === "calendar" ? <CalendarView library={library} onOpen={setSelected} /> :
          <ImportView library={library} onImportConfirm={handleImportConfirm} />}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>

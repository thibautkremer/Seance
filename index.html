// === UTILITAIRE ===
function updateHeaderCount() {
  const el = document.getElementById("libCount");
  if (!el) return;
  if (library.length > 0) {
    el.textContent = library.length;
    el.classList.remove("hidden");
  } else {
    el.classList.add("hidden");
  }
}

function setCloudStatus(status) {
  const el = document.getElementById("cloudStatus");
  if (!el) return;

  if (status === "syncing") {
    el.innerHTML = "Sync...";
  } else if (status === "offline") {
    el.innerHTML = "Hors-ligne";
    el.title = "Le cloud Supabase est inaccessible. Vérifie ta connexion.";
  } else {
    el.innerHTML = "Synchro OK";
  }
}

function saveLocalDB(mediaId = null) {
  try {
    localStorage.setItem("personal_tracker_db", JSON.stringify(library));
  } catch (e) {
    console.error("Erreur quota localStorage", e);
    const statusEl = document.getElementById("mass-update-status");
    if (statusEl) {
      statusEl.textContent = "Trop de données en local. Pense à nettoyer ta bibliothèque.";
    }
  }

  updateHeaderCount();

  if (mediaId) {
    queueForSync(mediaId);
  }
}

function queueForSync(mediaId) {
  if (!syncQueue.includes(mediaId)) {
    syncQueue.push(mediaId);
    localStorage.setItem("personal_tracker_sync_queue", JSON.stringify(syncQueue));
  }
}

async function processSyncQueue() {
  if (!supabaseClient || syncQueue.length === 0) return;

  setCloudStatus("syncing");

  for (let i = syncQueue.length - 1; i >= 0; i--) {
    const id = syncQueue[i];
    const item = library.find(x => x.id === id);

    try {
      if (item) {
        await supabaseClient
          .from("userlibrary")
          .upsert({
            userid: localUserId,
            mediaid: id,
            mediadata: item,
            lastmodified: item.lastmodified
          }, {
            onConflict: "userid,mediaid"
          });
      } else {
        await supabaseClient
          .from("userlibrary")
          .delete()
          .match({ userid: localUserId, mediaid: id });
      }
      syncQueue.splice(i, 1);
    } catch (e) {
      console.error("Erreur processSyncQueue", e);
      localStorage.setItem("personal_tracker_sync_queue", JSON.stringify(syncQueue));
      setCloudStatus("offline");
      return;
    }
  }

  localStorage.setItem("personal_tracker_sync_queue", JSON.stringify(syncQueue));
  setCloudStatus("online");
}

async function forceSync() {
  if (!supabaseClient) return;

  setCloudStatus("syncing");

  try {
    const { data, error } = await supabaseClient
      .from("userlibrary")
      .select("*")
      .eq("userid", localUserId);

    if (error) throw error;

    if (data && data.length) {
      let localUpdated = false;

      data.forEach(cloudRow => {
        const localIdx = library.findIndex(x => x.id === cloudRow.mediaid);
        if (localIdx === -1) {
          library.push(cloudRow.mediadata);
          localUpdated = true;
        } else if (cloudRow.lastmodified > (library[localIdx].lastmodified || 0)) {
          library[localIdx] = cloudRow.mediadata;
          localUpdated = true;
        }
      });

      if (localUpdated) {
        localStorage.setItem("personal_tracker_db", JSON.stringify(library));
        updateHeaderCount();
        if (!document.getElementById("tab-library").classList.contains("hidden")) {
          renderLibrary();
        }
        if (!document.getElementById("tab-profile").classList.contains("hidden")) {
          renderProfile();
        }
      }
    }

    await processSyncQueue();
    setCloudStatus("online");
  } catch (e) {
    console.error(e);
    setCloudStatus("offline");
  }
}

function deduplicateLibrary() {
  if (!Array.isArray(library)) {
    library = [];
    return;
  }
  const unique = [];
  const seen = new Set();
  library.sort((a, b) => (b.lastmodified || 0) - (a.lastmodified || 0));
  for (const item of library) {
    if (!item || !item.id || !item.title) continue;
    if (!seen.has(item.id)) {
      seen.add(item.id);
      unique.push(item);
    }
  }
  library = unique;
}

  if ("IntersectionObserver" in window) {
    const searchObserver = new IntersectionObserver((entries) => {
      if (entries[0].isIntersecting) {
        searchPage++;
        renderSearchGrid(false);
      }
    });
    const discoverObserver = new IntersectionObserver((entries) => {
      if (entries[0].isIntersecting) {

    const searchSentinel = document.getElementById("searchSentinel");
    const discoverSentinel = document.getElementById("discoverSentinel");

function renderCalendarTab() {
  const container = document.getElementById("calendarTimeline");
  if (!container) return;
  container.innerHTML = "";

  const today = new Date();
  today.setHours(0, 0, 0, 0);

  let futureItems = [];

  // Épisodes de séries
  library.forEach(item => {
    if (item.type !== "series" || !Array.isArray(item.episodes)) return;

    item.episodes.forEach(ep => {
      if (!ep.airdate || ep.watched || item.status === "Abandoned") return;

      const epDateStr = ep.airdate;
      const epDate = new Date(epDateStr);
      epDate.setHours(0, 0, 0, 0);

      if (calFilter === "today" && epDateStr !== todayString) return;
      if (calFilter === "week") {
        const diffMs = epDate - today;
        const diffDays = diffMs / 86400000;
        if (diffDays < 0 || diffDays > 7) return;
      }
      if (calFilter === "month") {
        if (epDate.getMonth() !== today.getMonth() || epDate.getFullYear() !== today.getFullYear()) return;
      }

      futureItems.push({
        mediaId: item.id,
        showTitle: item.title,
        showImage: item.image || "",
        epName: ep.name,
        season: ep.season,
        number: ep.number,
        airdate: epDateStr,
        type: "episode",
      });
    });
  });

  if (!futureItems.length) {
    container.innerHTML = `<p class="text-xs text-gray-500 text-center py-12">Aucune sortie planifiée.</p>`;
    return;
  }

  futureItems.sort((a, b) => a.airdate.localeCompare(b.airdate));

  const groups = {};
  futureItems.forEach(ep => {
    if (!groups[ep.airdate]) groups[ep.airdate] = [];
    groups[ep.airdate].push(ep);
  });

  Object.entries(groups).forEach(([date, eps]) => {
    const diff = Math.ceil((new Date(date) - today) / 86400000);
    let label;
    if (diff === 0) label = "Aujourd'hui";
    else if (diff === 1) label = "Demain";
    else label = `J+${diff}`;

    container.innerHTML += `
      <div class="text-[11px] font-black text-teal-400 uppercase tracking-wider mt-3 mb-1">
        ${label}
      </div>
    `;

    eps.forEach(ep => {
      container.innerHTML += `
        <div class="bg-gray-800 border border-gray-700 p-3 rounded-xl flex gap-3 items-center shadow cursor-pointer"
             onclick="openFromCalendar('${ep.mediaId}')">
          <img src="${ep.showImage || "https://placehold.co/80x120"}"
               class="w-10 h-14 object-cover rounded-lg bg-gray-900" />
          <div class="flex-1 min-w-0">
            <div class="text-[9px] uppercase font-black text-teal-400 truncate">${ep.showTitle}</div>
            <h4 class="font-bold text-white text-xs truncate">
              S${ep.season}E${ep.number} • ${ep.epName}
            </h4>
            <span class="text-[10px] text-gray-500">${ep.airdate}</span>
          </div>
        </div>
      `;
    });
  });
}

function formatDuration(totalMin) {
  if (isNaN(totalMin)) totalMin = 0;
  let r = Math.max(0, Math.round(totalMin));

  const days = Math.floor(r / (24 * 60));
  r -= days * 24 * 60;
  const hours = Math.floor(r / 60);

  const parts = [];
  if (days) parts.push(`${days} j`);
  if (hours || !parts.length) parts.push(`${hours} h`);

  return parts.join(" ");
}

function renderProfile() {
  if (!Array.isArray(library)) {
    library = [];
  }

  const elHours      = document.getElementById("stat-hours");
  const elBacklog    = document.getElementById("stat-backlog-hours");
  const elSeries     = document.getElementById("stat-series");
  const elEpWatched  = document.getElementById("stat-episodes-watched");
  const elSeriesFin  = document.getElementById("stat-series-finished");
  const elMoviesFin  = document.getElementById("stat-movies-finished");
  const elAvgRating  = document.getElementById("stat-avg-rating");
  const elPieTotal   = document.getElementById("pieTotal");
  const elPieSeries  = document.getElementById("pieSeries");
  const elPieMovies  = document.getElementById("pieMovies");
  const elPieSeriesT = document.getElementById("pieSeriesText");
  const elPieMoviesT = document.getElementById("pieMoviesText");
  const elGenreBars  = document.getElementById("stat-genre-bars");
  const elTop10      = document.getElementById("stat-top-10");

  if (!elHours || !elBacklog || !elSeries || !elEpWatched || !elSeriesFin ||
      !elMoviesFin || !elAvgRating || !elPieTotal || !elPieSeries ||
      !elPieMovies || !elPieSeriesT || !elPieMoviesT || !elGenreBars || !elTop10) {
    return;
  }

  let totalMin = 0, seriesCount = 0, moviesCount = 0;
  let seriesFinished = 0, moviesFinished = 0;
  let totalRating = 0, ratingCount = 0;
  let epWatchedCount = 0, backlogMin = 0;

  const gc = {};

  library.forEach(item => {
    if (item.rating && item.rating > 0) {
      totalRating += item.rating;
      ratingCount++;
    }

    (item.genres || []).forEach(g => {
      gc[g] = (gc[g] || 0) + 1;
    });

    if (item.type === "movie") {
      moviesCount++;
      const runtime = item.runtime && item.runtime > 0 ? item.runtime : 120;

      if (item.status === "Watched") {
        totalMin += runtime;
        moviesFinished++;
      } else if (item.status !== "Watched") {
        backlogMin += runtime;
      }
    } else if (item.type === "series") {
      seriesCount++;
      if (item.status === "Watched") {
        seriesFinished++;
      }

      const episodes = Array.isArray(item.episodes) ? item.episodes : [];
      episodes.forEach(ep => {
        const rt = item.runtime && item.runtime > 0 ? item.runtime : 40;
        if (ep.watched) {
          totalMin += rt;
          epWatchedCount++;
        } else if (!ep.watched && ep.airdate && ep.airdate <= todayString && item.status !== "Abandoned") {
          backlogMin += rt;
        }
      });
    }
  });

  elHours.textContent = formatDuration(totalMin);
  elBacklog.textContent = formatDuration(backlogMin);
  elSeries.textContent = seriesCount;
  elEpWatched.textContent = epWatchedCount;
  elSeriesFin.textContent = seriesFinished;
  elMoviesFin.textContent = moviesFinished;
  elAvgRating.textContent = ratingCount > 0 ? (totalRating / ratingCount).toFixed(1) : "NA";

  const totalMedia = seriesCount + moviesCount;
  const pctSeries = totalMedia > 0 ? Math.round(seriesCount / totalMedia * 100) : 0;
  const pctMovies = totalMedia > 0 ? 100 - pctSeries : 0;

  elPieTotal.textContent = totalMedia;
  elPieSeries.setAttribute("stroke-dasharray", `${pctSeries}, 100`);
  elPieMovies.setAttribute("stroke-dasharray", `${pctMovies}, 100`);
  elPieMovies.setAttribute("stroke-dashoffset", `-${pctSeries}`);
  elPieSeriesT.textContent = `${pctSeries}%`;
  elPieMoviesT.textContent = `${pctMovies}%`;

  const sortedGenres = Object.entries(gc).sort((a, b) => b[1] - a[1]);
  if (sortedGenres.length) {
    const max = sortedGenres[0][1];
    elGenreBars.innerHTML = sortedGenres.slice(0, 5).map(([g, c]) => `
      <div class="space-y-1">
        <div class="flex justify-between text-[10px] mb-1 font-bold">
          <span class="text-gray-300">${g}</span>
          <span class="text-teal-500">${c}</span>
        </div>
        <div class="w-full h-1.5 bg-gray-700 rounded-full overflow-hidden border border-gray-600">
          <div class="h-full bg-teal-500" style="width:${Math.round(c / max * 100)}%"></div>
        </div>
      </div>
    `).join("");
  } else {
    elGenreBars.innerHTML = `<p class="text-xs text-gray-500 py-2">Aucune donnée de genre.</p>`;
  }

  const topSeries = library
    .filter(i => i.type === "series" && i.rating && i.rating > 0)
    .sort((a, b) => b.rating - a.rating)
    .slice(0, 10);

  if (!topSeries.length) {
    elTop10.innerHTML = `<p class="text-xs text-gray-500 py-2">Aucune série avec note pour le moment.</p>`;
  } else {
    elTop10.innerHTML = topSeries.map((s, idx) => `
      <div class="flex items-center gap-3 bg-gray-900/50 p-2 rounded-xl border border-gray-700/50 shadow-sm">
        <span class="text-teal-500 font-black w-4 text-right">${idx + 1}.</span>
        <img src="${s.image || ""}" class="w-8 h-12 object-cover rounded border border-gray-800" />
        <div class="flex-1 truncate text-white font-bold text-xs">${s.title}</div>
        <div class="text-yellow-400 font-bold text-[10px] bg-yellow-950/30 px-2 py-1 rounded border border-yellow-700/50">
          ${s.rating.toFixed(1)}
        </div>
      </div>
    `).join("");
  }
}

// === BIBLIOTHÈQUE & FILTRES INTELLIGENTS ===
function setSmartFilter(value) {
  smartFilter = value;
  renderLibrary();
}

function renderLibrary() {
  const typeFilter = document.getElementById("libraryTypeFilter").value;
  const statusFilter = document.getElementById("libraryStatusFilter").value;
  const diffFilter = document.getElementById("libraryDiffusionFilter").value;
  const searchInput = document.getElementById("librarySearch").value.trim().toLowerCase();
  const grid = document.getElementById("libraryGrid");

  let results = Array.isArray(library) ? library.slice() : [];

  if (typeFilter !== "all") {
    results = results.filter(item => item.type === typeFilter);
  }

  if (statusFilter !== "all") {
    if (statusFilter === "watched") {
      results = results.filter(item => item.status === "Watched");
    } else if (statusFilter === "notfinished") {
      results = results.filter(item => item.status !== "Watched" && item.status !== "Abandoned");
    } else if (statusFilter === "abandoned") {
      results = results.filter(item => item.status === "Abandoned");
    }
  }

  if (diffFilter !== "all") {
    results = results.filter(item => item.statusproduction === diffFilter);
  }

  if (smartFilter) {
    results = results.filter(item => {
      if (smartFilter === "netflix") {
        return item.network && item.network.toLowerCase().includes("netflix");
      }
      if (smartFilter === "disney") {
        return item.network && item.network.toLowerCase().includes("disney");
      }
      if (smartFilter === "prime") {
        return item.network && item.network.toLowerCase().includes("prime");
      }
      if (smartFilter === "anime") {
        return item.genres && item.genres.some(g => g.toLowerCase().includes("anime"));
      }
      return true;
    });
  }

  if (searchInput) {
    results = results.filter(item => {
      const t = (item.title || "").toLowerCase();
      return t.includes(searchInput);
    });
  }

  grid.innerHTML = "";

  results.forEach(item => {
    const card = buildLibraryCard(item);
    grid.appendChild(card);
  });
}

function buildLibraryCard(item) {
  const card = document.createElement("div");
  const year = item.premiered ? new Date(item.premiered).getFullYear() : "";
  const rate = item.rating && item.rating > 0 ? item.rating.toFixed(1) : "NA";
  card.className = "bg-gray-900 border border-gray-700 rounded-xl overflow-hidden";

  card.innerHTML = `
    <div class="relative">
      <img src="${item.image || "https://placehold.co/155x220"}" class="media-poster" />
      <span class="absolute bottom-1 right-1 text-[9px] bg-gray-900/80 px-1.5 py-0.5 rounded text-gray-300">
        ${year}
      </span>
    </div>
    <div class="p-2 text-xs">
      <div class="font-bold text-white truncate">${item.title}</div>
      <div class="flex items-center gap-1 mt-1">
        <span class="text-[9px] text-gray-400 bg-gray-800 px-1.5 py-0.5 rounded border border-gray-700">
          ${item.network || ""}
        </span>
        <span class="text-[9px] text-yellow-400 font-bold bg-yellow-900/30 px-1.5 py-0.5 rounded border border-yellow-700/50">
          ${rate}
        </span>
      </div>
    </div>
  `;

  card.onclick = () => {
    openPreviewModal(JSON.stringify(item));
  };

  return card;
}

// === CASCADE ÉPISODES ===
function toggleEpCascade(epId, seasonStr) {
  const item = library[activeModalMediaIndex];
  if (!item || !Array.isArray(item.episodes)) return;

  const epIndex = item.episodes.findIndex(e => e.id === epId);
  if (epIndex === -1) return;

  const ep = item.episodes[epIndex];
  if (!ep.airdate || ep.airdate > todayString) {
    // On ne permet pas de toggle sur un épisode non sorti
    return;
  }

  const targetState = !ep.watched;

  if (targetState) {
    // Marquer comme vu : tous les épisodes <= epIndex déjà sortis
    for (let i = 0; i <= epIndex; i++) {
      const candidate = item.episodes[i];
      if (candidate.airdate && candidate.airdate <= todayString) {
        candidate.watched = true;
      }
    }
  } else {
    // Marquer comme non vu : tous les épisodes >= epIndex déjà sortis
    for (let i = epIndex; i < item.episodes.length; i++) {
      const candidate = item.episodes[i];
      if (candidate.airdate && candidate.airdate <= todayString) {
        candidate.watched = false;
      }
    }
  }

  item.status = item.episodes.every(e => e.watched) ? "Watched" : "In Progress";
  item.lastmodified = Date.now();
  saveLocalDB(item.id);

  const prog = getProgress(item);
  const txt = document.getElementById("modalProgressText");
  const bar = document.getElementById("modalProgressBar");
  if (txt) txt.textContent = prog;
  if (bar) bar.style.width = prog;

  const filtered = item.episodes.filter(e => e.season === parseInt(seasonStr, 10));
  renderEpisodes(filtered, true);
}

// === IMPORT JSON & SUPPRESSION ===
function alreadyInLibrary(raw) {
  const normTitle = (raw.title || "").trim().toLowerCase();
  return library.some(x => {
    if (!x.title) return false;
    return x.type === raw.type &&
      x.title.trim().toLowerCase() === normTitle;
  });
}

async function importLibrary(event) {
  const file = event.target.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = async (e) => {
    try {
      const data = JSON.parse(e.target.result);

      for (let raw of data) {
        if (!alreadyInLibrary(raw)) {
          const id = raw.id || `${raw.type}-${raw.title}-${Date.now()}`;
          library.push({ ...raw, id, lastmodified: Date.now() });
          queueForSync(id);
        }
      }

      saveLocalDB();
      renderProfile();
      alert("Import terminé. Lancez la mise à jour massive pour récupérer les infos manquantes.");
    } catch (err) {
      alert("Erreur JSON");
      console.error(err);
    }
  };
  reader.readAsText(file);
}

function removeFromLibrary(id) {
  library = library.filter(i => i.id !== id);
  saveLocalDB();
  queueForSync(id);
  updateAllCardsUI(); // fonction déjà présente dans ton script original
  if (!document.getElementById("tab-library").classList.contains("hidden")) {
    renderLibrary();
  }
  processSyncQueue();
}

function clearAll() {
  if (!confirm("Vider toute la bibliothèque ?")) return;

  library.forEach(i => queueForSync(i.id));
  library = [];
  saveLocalDB();
  renderLibrary();
  renderProfile();
  processSyncQueue();
}

// === MASS UPDATE (TVMAZE & OMDB) ===
async function massUpdateLibrary() {
  const btn = document.getElementById("btn-mass-update");
  const status = document.getElementById("mass-update-status");
  if (!btn) return;

  btn.innerHTML = '<span class="animate-pulse">Mise à jour en cours • Ne pas quitter...</span>';
  btn.disabled = true;
  btn.classList.add("opacity-70");
  if (status) status.textContent = "Mise à jour en cours (peut prendre plusieurs minutes)...";

  try {
    for (let i = 0; i < library.length; i++) {
      const item = library[i];

      try {
        if (item.type === "series") {
          const res = await fetch(`${TVMAZE_API}/shows/${item.apiId}?embed=episodes`);
          const data = await res.json();

          item.rating = data.rating?.average || item.rating;
          item.runtime = data.averageRuntime || data.runtime || item.runtime;
          item.summary = data.summary?.replace(/<[^>]+>/g, "") || item.summary;
          item.statusproduction = data.status || item.statusproduction;
          item.network = data.network?.name || data.webChannel?.name || item.network;

          const apiEps = data._embedded?.episodes || [];
          const newEpsList = [];

          apiEps.forEach(apiEp => {
            const existing = item.episodes?.find(e => e.id === apiEp.id);
            const isReleased = apiEp.airdate && apiEp.airdate <= todayString;

            let watched = false;
            if (existing) {
              watched = existing.watched;
            } else if (isReleased) {
              watched = false;
            }

            newEpsList.push({
              id: apiEp.id,
              season: apiEp.season,
              number: apiEp.number,
              name: apiEp.name,
              airdate: apiEp.airdate,
              watched
            });
          });

          item.episodes = newEpsList;
          item.status = newEpsList.every(e => e.watched) ? "Watched" : "In Progress";
          item.lastmodified = Date.now();
        } else if (item.type === "movie") {
          const res = await fetch(`${OMDB_API}&i=${item.apiId}&plot=full`);
          const data = await res.json();

          if (data.Response === "True") {
            item.rating = parseFloat(data.imdbRating) || item.rating;
            item.runtime = parseInt(data.Runtime, 10) || item.runtime;
            item.summary = data.Plot || item.summary;
            item.lastmodified = Date.now();
          }
        }

        saveLocalDB(item.id);
      } catch (e) {
        console.error("Erreur maj", item.title, e);
      }
    }

    renderProfile();
    if (!document.getElementById("tab-library").classList.contains("hidden")) {
      renderLibrary();
    }

    if (status) status.textContent = "Mise à jour terminée.";
    alert("Mise à jour de la bibliothèque terminée avec succès !");
  } catch (e) {
    console.error("Erreur MAJ massive", e);
    if (status) status.textContent = "Erreur pendant la mise à jour. Voir la console.";
    alert("Erreur pendant la mise à jour. Vérifie la console.");
  } finally {
    btn.innerHTML = "Mettre à jour Infos & Épisodes API";
    btn.disabled = false;
    btn.classList.remove("opacity-70");
  }
}

// === MODALE MEDIA (simplifié, à adapter à ton implémentation) ===
function openPreviewModal(jsonStr) {
  try {
    const item = JSON.parse(jsonStr);
    const modal = document.getElementById("mediaModal");
    if (!modal) return;

    activeModalMediaIndex = library.findIndex(x => x.id === item.id);

    document.getElementById("modalPoster").src = item.image || "https://placehold.co/155x220";
    document.getElementById("modalTitle").textContent = item.title || "Détails";
    document.getElementById("modalTypeBadge").textContent = (item.type === "movie" ? "FILM" : "SÉRIE");
    document.getElementById("modalNetwork").textContent = item.network || "";
    document.getElementById("modalPremiereDate").textContent = item.premiered || "";
    document.getElementById("modalRuntime").textContent = (item.runtime ? `${item.runtime} min` : "-- min");
    document.getElementById("modalSummary").textContent = item.summary || "";

    const ratingTxt = document.getElementById("modalGlobalRatingText");
    const ratingBar = document.getElementById("modalGlobalRatingBar");
    const rating = item.rating && item.rating > 0 ? item.rating : 0;
    ratingTxt.textContent = rating ? rating.toFixed(1) : "N/A";
    ratingBar.style.width = rating ? `${Math.min(rating * 10, 100)}%` : "0";

    modal.classList.remove("hidden");
  } catch (e) {
    console.error("Erreur openPreviewModal", e);
  }
}

function closeModal() {
  const modal = document.getElementById("mediaModal");
  if (modal) modal.classList.add("hidden");
}

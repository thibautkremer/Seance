<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TV TIME REBORN</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background-color: #111827; }
        .hide-scroll::-webkit-scrollbar { display: none; }
        .media-card-img { width: 155.88px; height: 217.56px; object-fit: cover; display: block; }
        .media-grid { display: grid; gap: 0.5rem; grid-template-columns: repeat(3, 1fr); }
        @media (min-width: 768px) { .media-grid { grid-template-columns: repeat(6, 1fr); } }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 font-sans pb-20">

<header class="bg-gray-800 border-b border-gray-700 sticky top-0 z-50">
    <div class="max-w-screen-2xl mx-auto px-4 py-3 flex justify-between items-center">
        <h1 class="text-lg font-black text-teal-400">TV TIME <span class="text-white text-xs px-2 bg-teal-600 rounded">REBORN</span></h1>
        <span id="cloudStatus" class="text-[10px] px-2 py-0.5 bg-gray-900 rounded-full font-bold border border-gray-700 text-gray-400">○ Local</span>
    </div>
</header>
<main class="max-w-screen-2xl mx-auto px-3 pt-4">
    <div id="tab-search" class="space-y-4">
        <input type="text" id="searchInput" placeholder="Rechercher..." class="w-full bg-gray-800 border border-gray-700 rounded-xl px-4 py-3 text-white text-sm" />
        <div id="searchResults" class="media-grid"></div>
    </div>

    <!-- Nouveaux Filtres Bibliothèque -->
    <div id="tab-library" class="space-y-3 hidden">
        <div class="flex gap-2 flex-wrap mb-4">
            <select id="libraryStatusFilter" onchange="renderLibrary()" class="bg-gray-800 text-xs p-2 rounded border border-gray-700">
                <option value="not_finished">En cours</option>
                <option value="watched">Terminé</option>
                <option value="abandoned">Abandonné</option>
                <option value="all">Tous</option>
            </select>
            <select id="libraryTypeFilter" onchange="renderLibrary()" class="bg-gray-800 text-xs p-2 rounded border border-gray-700">
                <option value="all">Tous types</option>
                <option value="series">Séries</option>
                <option value="movie">Films</option>
            </select>
            <input type="text" id="librarySearch" oninput="renderLibrary()" placeholder="Filtrer par nom..." class="bg-gray-800 text-xs p-2 rounded border border-gray-700">
        </div>
        <div id="libraryGrid" class="media-grid"></div>
    </div>

    <div id="tab-profile" class="hidden">
        <label class="bg-teal-600 text-white text-xs font-bold py-3 px-4 rounded-xl cursor-pointer">
            📂 Import JSON<input type="file" onchange="importLibrary(event)" class="hidden" accept=".json" />
        </label>
    </div>
</main>

<div id="mediaModal" class="fixed inset-0 bg-black/80 z-50 hidden p-4 flex items-center justify-center">
    <div class="bg-gray-800 w-full max-w-lg rounded-2xl p-4">
        <button onclick="closeModal()" class="text-white font-bold">✕ Fermer</button>
        <img id="modalPoster" class="w-full h-64 object-cover rounded" />
        <h2 id="modalTitle" class="text-xl font-bold mt-2"></h2>
        <span id="modalPremiereDate"></span>
        <span id="modalGlobalRating"></span>
        <p id="modalSummary" class="text-sm text-gray-300 mt-2"></p>
    </div>
</div>

<nav class="fixed bottom-0 left-0 right-0 bg-gray-800 border-t border-gray-700 h-16 flex items-center justify-around">
    <button onclick="switchTab('search')" class="text-xs">🔍 Chercher</button>
    <button onclick="switchTab('library')" class="text-xs">📚 Suivis</button>
    <button onclick="switchTab('profile')" class="text-xs">📊 Profil</button>
</nav>
<script>
    'use strict';
    
    // Configuration
    const TVMAZE_API = 'https://api.tvmaze.com';
    const OMDB_API   = 'https://www.omdbapi.com/?apikey=1e01c814';
    const SUPABASE_URL = 'https://vjhegncviufyguzdrpdp.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_hLYKWsVftWedOIbDinl0mQ_9uGREGsw';
    const localUserId = 'tvr_master_user_2026';
    
    let library = JSON.parse(localStorage.getItem('personal_tracker_db')) || [];
    let supabaseClient = null;

    // Initialisation
    function initSupabase() {
        try {
            supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            forceSync();
        } catch (e) { console.error("Init Supabase:", e); }
    }

    // Import intelligent
    async function importLibrary(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = async (e) => {
            const importedData = JSON.parse(e.target.result);
            const importBtnLabel = event.target.parentElement;
            
            for (let i = 0; i < importedData.length; i++) {
                importBtnLabel.innerHTML = `⏳ ${i + 1}/${importedData.length}`;
                let raw = importedData[i];
                
                try {
                    // Recherche enrichie API
                    const res = await fetch(`${TVMAZE_API}/search/shows?q=${encodeURIComponent(raw.title)}`);
                    const data = await res.json();
                    if (data.length > 0) {
                        const show = data[0].show;
                        let newItem = { 
                            ...raw, 
                            apiId: show.id, 
                            id: `series-${show.id}`,
                            image: show.image?.medium || 'https://placehold.co/210x295',
                            status_production: show.status
                        };
                        
                        const epRes = await fetch(`${TVMAZE_API}/shows/${show.id}/episodes`);
                        const epData = await epRes.json();
                        newItem.episodes = epData.map(ep => ({
                            id: ep.id, name: ep.name, season: ep.season, number: ep.number,
                            watched: raw.status === 'Watched'
                        }));
                        
                        const idx = library.findIndex(x => x.id === newItem.id);
                        if (idx !== -1) library[idx] = newItem; else library.push(newItem);
                    }
                } catch (err) { console.error(err); }
                await new Promise(r => setTimeout(r, 600));
            }
            saveLocalDB();
            renderLibrary();
            alert("Import terminé !");
        };
        reader.readAsText(file);
    }

    function saveLocalDB() { localStorage.setItem('personal_tracker_db', JSON.stringify(library)); }

    function renderLibrary() {
        const grid = document.getElementById('libraryGrid');
        if (!grid) return;

        // Récupération sécurisée des filtres
        const statusFilter = document.getElementById('libraryStatusFilter')?.value || 'all';
        const typeFilter = document.getElementById('libraryTypeFilter')?.value || 'all';
        const searchText = (document.getElementById('librarySearch')?.value || '').toLowerCase();

        const filtered = library.filter(item => {
            if (typeFilter !== 'all' && item.type !== typeFilter) return false;
            if (statusFilter !== 'all' && item.status !== statusFilter) return false;
            if (searchText && !item.title.toLowerCase().includes(searchText)) return false;
            return true;
        });

        grid.innerHTML = filtered.map((item, index) => `
            <div onclick="openLibraryModal(${index})" class="bg-gray-800 rounded-lg overflow-hidden cursor-pointer">
                <img src="${item.image}" class="media-card-img" onerror="this.src='https://placehold.co/210x295'" />
                <div class="p-2 text-[10px] truncate">${item.title}</div>
            </div>
        `).join('');
    }

    function openLibraryModal(index) {
        const item = library[index];
        document.getElementById('modalPoster').src = item.image;
        document.getElementById('modalTitle').textContent = item.title;
        document.getElementById('modalSummary').textContent = item.summary || 'Pas de résumé';
        // Correction du bug .split
        document.getElementById('modalPremiereDate').textContent = String(item.premiered || '').split('-')[0];
        document.getElementById('modalGlobalRating').textContent = `★ ${parseFloat(item.rating) > 0 ? parseFloat(item.rating).toFixed(1)+'/10' : 'N/A'}`;
        
        document.getElementById('mediaModal').classList.remove('hidden');
    }

    function closeModal() { document.getElementById('mediaModal').classList.add('hidden'); }
    function switchTab(name) {
        document.querySelectorAll('main > div').forEach(d => d.classList.add('hidden'));
        document.getElementById('tab-' + name).classList.remove('hidden');
        if (name === 'library') renderLibrary();
    }
</script>
</body>
</html>

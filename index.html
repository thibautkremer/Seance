<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TV TIME REBORN</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background-color: #111827; -webkit-tap-highlight-color: transparent; }
        .hide-scroll::-webkit-scrollbar { display: none; }
        .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }
        .hidden { display: none; }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 font-sans pb-24">
    <header class="bg-gray-800 border-b border-gray-700 sticky top-0 z-50 px-4 py-3 flex justify-between items-center shadow-md">
        <h1 class="text-lg font-black text-indigo-400">TV TIME <span class="text-white text-xs px-2 bg-indigo-600 rounded">REBORN</span></h1>
        <span id="cloudStatus" class="text-[10px] px-2 py-0.5 bg-emerald-950 text-emerald-400 rounded-full font-bold">☁️ Actif</span>
    </header>

    <main class="max-w-md mx-auto p-4 w-full sm:max-w-2xl">
        <div id="tab-search" class="space-y-4">
             <input type="text" id="searchInput" placeholder="Rechercher..." class="w-full bg-gray-800 border border-gray-700 rounded-xl px-4 py-3 text-white" />
             <div id="searchResults" class="space-y-3"></div>
        </div>
        </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-gray-800 border-t border-gray-700 h-16 flex items-center justify-around z-50">
        <button onclick="switchTab('search')" id="nav-search">🔍</button>
        <button onclick="switchTab('discover')" id="nav-discover">✨</button>
        <button onclick="switchTab('calendar')" id="nav-calendar">📅</button>
        <button onclick="switchTab('library')" id="nav-library">📚</button>
        <button onclick="switchTab('profile')" id="nav-profile">📊</button>
    </nav>
    <script>
        // 1. Configuration Supabase
        const supabase = supabase.createClient(
            'https://vjhegncviufyguzdrpdp.supabase.co', 
            'sb_publishable_hLYKWsVftWedOIbDinl0mQ_9uGREGsw'
        );

        let library = [];

        // 2. Initialisation
        window.addEventListener('DOMContentLoaded', async () => {
            const { data } = await supabase.from('user_media').select('*');
            library = data ? data.map(item => item.data) : (JSON.parse(localStorage.getItem('personal_tracker_db')) || []);
            renderLibrary();
        });

        // 3. Logique de sauvegarde
        async function saveToCloud(media) {
            localStorage.setItem('personal_tracker_db', JSON.stringify(library));
            try {
                await supabase.from('user_media').upsert({
                    id: media.id,
                    data: media,
                    status: media.status,
                    title: media.title,
                    type: media.type,
                    image: media.image
                });
            } catch (e) { console.error("Erreur Cloud:", e); }
        }

        // 4. Navigation
        function switchTab(tabName) {
            document.querySelectorAll('main > div').forEach(el => el.classList.add('hidden'));
            document.getElementById(`tab-${tabName}`).classList.remove('hidden');
        }

        // 5. Ajout direct (exemple)
        async function checkNextEpisodeDirect(event, origIndex) {
            event.stopPropagation();
            const item = library[origIndex];
            const nextEp = item.episodes?.find(e => !e.watched);
            if(nextEp) {
                nextEp.watched = true;
                item.status = item.episodes.every(e => e.watched) ? 'Watched' : 'In Progress';
                await saveToCloud(item);
                renderLibrary();
            }
        }
    </script>
</body>
</html>

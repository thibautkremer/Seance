<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TV TIME REBORN</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body { background-color: #111827; -webkit-tap-highlight-color: transparent; }
        .hide-scroll::-webkit-scrollbar { display: none; }
        .guide-line { position: absolute; left: 0; right: 0; border-top: 1px dashed rgba(234, 179, 8, 0.4); z-index: 0; }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 font-sans pb-24">

    <header class="bg-gray-800 border-b border-gray-700 sticky top-0 z-50 px-4 py-3 shadow-lg flex justify-between items-center">
        <h1 class="text-lg font-black text-indigo-400">TV TIME <span class="text-white text-xs px-2 bg-indigo-600 rounded">REBORN</span></h1>
        <span id="cloudStatus" class="text-[10px] px-2 py-0.5 bg-emerald-950 text-emerald-400 rounded-full font-bold">☁️ Actif</span>
    </header>

    <main id="app-container" class="max-w-md mx-auto p-4 w-full sm:max-w-2xl min-h-screen">
        </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-gray-900 border-t border-gray-800 h-16 flex items-center justify-around z-40 shadow-2xl">
        <button onclick="switchTab('search')" id="nav-search" class="flex flex-col items-center text-[10px] font-bold text-gray-400"><span>🔍</span>CHERCHER</button>
        <button onclick="switchTab('discover')" id="nav-discover" class="flex flex-col items-center text-[10px] font-bold text-gray-400"><span>✨</span>DÉCOUVRIR</button>
        <button onclick="switchTab('calendar')" id="nav-calendar" class="flex flex-col items-center text-[10px] font-bold text-gray-400"><span>📅</span>À VENIR</button>
        <button onclick="switchTab('library')" id="nav-library" class="flex flex-col items-center text-[10px] font-bold text-gray-400"><span>📚</span>SUIVIS</button>
        <button onclick="switchTab('profile')" id="nav-profile" class="flex flex-col items-center text-[10px] font-bold text-gray-400"><span>📊</span>PROFIL</button>
    </nav>

    <div id="mediaModal" class="fixed inset-0 bg-black/90 backdrop-blur z-50 overflow-y-auto p-4 hidden">
        <div class="bg-gray-800 border border-gray-700 w-full max-w-lg rounded-2xl p-6 shadow-2xl mx-auto">
            <h2 id="modalTitle" class="text-xl font-bold mb-4"></h2>
            <div id="modalSuggestionsBlock" class="hidden bg-gray-900 p-4 rounded-xl mb-4">
                <h3 class="text-sm font-bold text-indigo-400 mb-2">SUGGESTIONS</h3>
                <div id="modalSuggestionsList"></div>
            </div>
            <button onclick="closeModal()" class="w-full py-2 bg-gray-700 rounded-lg font-bold">Fermer</button>
        </div>
    </div>

    <script>
        const OMDB_KEY = "1e01c814";
        const TVMAZE_API = 'https://api.tvmaze.com';

        // Fonction de navigation centrale
        function switchTab(tabName) {
            const views = {
                search: `<div class="space-y-4">
                            <input type="text" oninput="triggerHybridSearch(this.value)" placeholder="Rechercher..." class="w-full bg-gray-800 border border-gray-700 rounded-xl px-4 py-3 text-white" />
                            <div id="searchResults" class="space-y-3"></div>
                         </div>`,
                library: '<h2 class="text-xl font-black">Suivis</h2>',
                calendar: '<h2 class="text-xl font-black">À Venir</h2>',
                discover: '<h2 class="text-xl font-black">Découvrir</h2>',
                profile: '<h2 class="text-xl font-black">Profil</h2>'
            };
            document.getElementById('app-container').innerHTML = views[tabName] || '';
            document.querySelectorAll('nav button').forEach(b => b.classList.replace('text-indigo-400', 'text-gray-400'));
            document.getElementById('nav-' + tabName).classList.replace('text-gray-400', 'text-indigo-400');
        }

        async function triggerHybridSearch(query) {
            if (query.length < 2) return;
            const res = await fetch(`https://www.omdbapi.com/?apikey=${OMDB_KEY}&s=${encodeURIComponent(query)}&type=movie`);
            const data = await res.json();
            const results = (data.Search || []).map(m => ({ title: m.Title, id: m.imdbID }));
            document.getElementById('searchResults').innerHTML = results.map(r => `
                <div class="bg-gray-800 p-3 rounded-lg cursor-pointer" onclick="openModal({title: '${r.title}'})">${r.title}</div>
            `).join('');
        }

        function openModal(m) {
            document.getElementById('modalTitle').textContent = m.title;
            document.getElementById('mediaModal').classList.remove('hidden');
        }

        function closeModal() { document.getElementById('mediaModal').classList.add('hidden'); }

        // Lancement initial
        window.onload = () => switchTab('search');
    </script>
</body>
</html>
